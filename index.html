<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F8F6F2">
<title>五域成长</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F6F2;--surface:#FFFFFF;--border:#E8E2D9;--border-mid:#CEC7BC;
  --text:#15140D;--text2:#68665F;--text3:#A8A49E;
  --sans:'Noto Sans SC',sans-serif;--mono:'DM Mono',monospace;
  --r:14px;--shadow:0 2px 12px rgba(0,0,0,.07);
  /* Domain colors - vibrant */
  --c1:#F5A623;--c1b:#FEF3DC;--c1t:#7A5010;
  --c2:#E8456A;--c2b:#FDEAEE;--c2t:#7A1830;
  --c3:#3DBD7D;--c3b:#E2F7ED;--c3t:#115C38;
  --c4:#38B6D4;--c4b:#DFF4FA;--c4t:#0E5A6B;
  --c5:#8B5CF6;--c5b:#EEE8FE;--c5t:#3B1A8A;
  --purple:#8B5CF6;--purple-light:#EEE8FE;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);color:var(--text);display:flex;flex-direction:column}
.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;min-height:0}
.view.active{display:flex}

/* NAV */
#bnav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + var(--safe-b));flex-shrink:0;z-index:100}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 0;color:var(--text3);font-family:var(--sans);transition:color .2s;position:relative}
.nbtn.active{color:var(--text)}
.nbtn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.nbtn span{font-size:10px;font-weight:500}
.nbadge{position:absolute;top:3px;right:calc(50% - 18px);width:7px;height:7px;background:#E85D3C;border-radius:50%;border:1.5px solid var(--surface)}

/* SHARED */
.slbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:11px 20px;border-radius:10px;border:none;cursor:pointer;transition:all .15s;width:100%}
.btn-dark{background:var(--text);color:var(--surface)}
.btn-dark:active{opacity:.8}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border-mid);padding:7px 14px;width:auto;font-family:var(--sans);font-size:12px;border-radius:8px;cursor:pointer}
.divider{height:1px;background:var(--border);margin:12px 0}

/* ANIMATIONS */
@keyframes arcSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes arcSpinR{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fall{from{transform:translateY(-20px) rotate(0deg);opacity:1}to{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes entjFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.ldots span{display:inline-block;animation:blink 1.2s infinite;font-size:18px}
.ldots span:nth-child(2){animation-delay:.2s}
.ldots span:nth-child(3){animation-delay:.4s}

/* ═══════════════════════════
   HOME VIEW
═══════════════════════════ */
#v-home{padding-bottom:16px}

/* Hero with orbital arcs */
.hero{position:relative;padding:0 16px 16px;flex-shrink:0;overflow:hidden;min-height:180px}
.hero-arcs{position:absolute;top:-60px;right:-80px;width:300px;height:300px;pointer-events:none}
.arc-group{transform-origin:150px 150px}
.arc-group:nth-child(1){animation:arcSpin 18s linear infinite}
.arc-group:nth-child(2){animation:arcSpinR 24s linear infinite}
.arc-group:nth-child(3){animation:arcSpin 32s linear infinite}
.arc-group:nth-child(4){animation:arcSpinR 14s linear infinite}
.arc-group:nth-child(5){animation:arcSpin 20s linear infinite}
.hero-content{position:relative;z-index:1;padding-top:18px}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hero-date{font-family:var(--mono);font-size:11px;color:var(--text3)}
.streak{display:flex;align-items:center;gap:5px;background:var(--text);color:var(--surface);font-family:var(--mono);font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500}
.quote-card{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;box-shadow:var(--shadow)}
.quote-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.quote-text{font-size:13px;line-height:1.65;color:var(--text);font-weight:300}

/* Focus strip */
.focus-strip{padding:0 16px;margin-bottom:4px}
.focus-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.focus-row::-webkit-scrollbar{display:none}
.focus-chip{flex-shrink:0;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all .15s;min-width:115px}
.focus-chip:active{transform:scale(.96)}
.focus-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.focus-chip-name{font-size:12px;font-weight:500;white-space:nowrap}
.focus-chip-pct{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto}

/* Domain cards */
.domain-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.dcard{border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s;border:1.5px solid transparent}
.dcard-head{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none;background:rgba(255,255,255,.95)}
.dcard-accent{width:4px;border-radius:2px;flex-shrink:0;transition:height .2s}
.dcard-info{flex:1;min-width:0}
.dcard-name{font-size:14px;font-weight:500}
.dcard-status{font-size:11px;color:var(--text3);margin-top:2px}
.dcard-ring{width:34px;height:34px;flex-shrink:0}
.ring-track{fill:none;stroke:var(--border);stroke-width:3.5}
.ring-fill{fill:none;stroke-width:3.5;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dasharray .6s ease}
.ring-pct{font-family:var(--mono);font-size:9px;fill:var(--text);font-weight:500}
.dcard-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.dcard-body.open{max-height:2400px}
.dcard-inner{border-top:1.5px solid var(--border);padding:14px;background:rgba(255,255,255,.95)}

/* Item rows */
.item-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.item-row{display:flex;align-items:flex-start;gap:8px}
.item-check{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--border-mid);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px}
.item-check.done{border-color:transparent}
.item-check.done::after{content:'✓';font-size:10px;font-weight:600;color:#fff}
.item-text-wrap{flex:1;display:flex;align-items:center;gap:6px}
.item-text{font-size:12px;line-height:1.5;flex:1}
.item-text.done{color:var(--text3);text-decoration:line-through}
.item-edit-btn{font-size:13px;color:var(--text3);cursor:pointer;opacity:0;transition:opacity .15s;flex-shrink:0;background:none;border:none;padding:0 2px}
.item-row:hover .item-edit-btn{opacity:1}
.item-edit-input{font-family:var(--sans);font-size:12px;flex:1;border:1px solid var(--border-mid);border-radius:6px;padding:4px 8px;outline:none;background:var(--bg);color:var(--text)}

/* Log records */
.log-records{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.log-record-card{border-radius:10px;padding:11px 13px;position:relative;animation:fadeSlideUp .2s ease;border:1px solid transparent}
.lrc-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:5px}
.lrc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.lrc-tag{font-size:10px;padding:2px 9px;border-radius:20px;color:#fff;font-weight:500}
.lrc-text{font-size:12px;line-height:1.6;color:var(--text);margin-bottom:3px}
.lrc-review{font-size:12px;line-height:1.6;color:var(--text2);border-top:1px solid rgba(0,0,0,.06);margin-top:6px;padding-top:6px;font-style:italic}
.lrc-stars{font-size:11px;margin-top:3px}
.lrc-del{position:absolute;top:8px;right:10px;font-size:16px;cursor:pointer;background:none;border:none;opacity:.35;color:var(--text)}
.lrc-del:hover{opacity:.8}
.ai-chip{display:inline-flex;align-items:center;gap:5px;background:var(--purple-light);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--purple);margin-bottom:8px;line-height:1.4}
.ai-chip-mark{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.06em;opacity:.7}

/* Log form */
.log-form{display:flex;flex-direction:column;gap:10px}
.log-step{background:var(--bg);border-radius:10px;padding:12px}
.log-step-q{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px}
.tag-grid{display:flex;flex-wrap:wrap;gap:6px}
.tag-opt{font-size:12px;padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.tag-opt.sel{color:#fff;border-color:transparent;font-weight:500}
.tag-opt:active{transform:scale(.94)}
.log-input{font-family:var(--sans);font-size:13px;line-height:1.6;color:var(--text);background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;resize:none;width:100%;min-height:68px;outline:none;transition:border-color .15s}
.log-input:focus{border-color:var(--border-mid)}
.log-input::placeholder{color:var(--text3)}
.minireview-input{font-family:var(--sans);font-size:13px;line-height:1.6;color:var(--text);background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;resize:none;width:100%;min-height:78px;outline:none;transition:border-color .15s}
.minireview-input:focus{border-color:var(--border-mid)}
.minireview-input::placeholder{color:var(--text3)}
.energy-wrap{display:flex;align-items:center;gap:10px}
.stars{display:flex;gap:5px}
.star{font-size:24px;cursor:pointer;color:var(--border-mid);transition:transform .1s}
.star.lit{color:#E8A020}
.star:active{transform:scale(1.3)}

/* ═══════════════════════════
   OVERVIEW / DASHBOARD
═══════════════════════════ */
#v-ov .inner{padding:16px;display:flex;flex-direction:column;gap:16px;padding-bottom:24px}
.week-nav{display:flex;align-items:center;gap:8px}
.week-nav button{font-family:var(--mono);font-size:13px;background:var(--surface);border:1px solid var(--border-mid);border-radius:8px;padding:5px 12px;cursor:pointer;color:var(--text2)}
.week-lbl{flex:1;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text)}

/* ENTJ status card */
.entj-status-card{border-radius:var(--r);padding:16px 18px;background:linear-gradient(135deg,#3B1A8A 0%,#6D28D9 60%,#8B5CF6 100%);color:#fff;display:flex;gap:14px;align-items:center;box-shadow:0 4px 20px rgba(139,92,246,.3)}
.esc-avatar{width:52px;height:80px;flex-shrink:0;animation:entjFloat 3s ease-in-out infinite}
.esc-content{flex:1}
.esc-label{font-family:var(--mono);font-size:10px;opacity:.7;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.esc-text{font-size:13px;line-height:1.65;font-weight:300}
.esc-loading{opacity:.6;font-size:12px}
.esc-btn{margin-top:10px;font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-family:var(--sans)}

/* Domain arc strips */
.arc-dashboard{display:flex;flex-direction:column;gap:8px}
.arc-strip{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.arc-strip:active{opacity:.9}
.arc-strip-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.arc-strip-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.arc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.arc-strip-meta{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap}
.arc-meta-item{font-family:var(--mono);font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px}
.arc-trend{font-size:12px}
.arc-bar-track{height:5px;background:var(--border);border-radius:3px;margin-top:6px}
.arc-bar-fill{height:5px;border-radius:3px;transition:width .6s ease}
.arc-pct{font-family:var(--mono);font-size:16px;font-weight:500;flex-shrink:0;min-width:38px;text-align:right}

/* Heatmap */
.hm-lbls{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.hm-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);text-align:center}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hm-cell{aspect-ratio:1;border-radius:4px;background:var(--border)}
.hm-cell span{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.75)}

/* Blockpoints */
.bp-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-bottom:8px}
.bp-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bp-dot{width:9px;height:9px;border-radius:50%}
.bp-name{font-size:13px;font-weight:500}
.bp-input{font-family:var(--sans);font-size:12px;width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.bp-input:focus{border-color:var(--border-mid)}
.bp-input::placeholder{color:var(--text3)}
.bp-save{margin-top:7px;font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border-mid);background:var(--surface);color:var(--text2);cursor:pointer;font-family:var(--sans)}

/* ═══════════════════════════
   DETAIL VIEW
═══════════════════════════ */
#v-detail{background:var(--bg)}
.detail-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--text2);padding:0 4px;line-height:1}
.detail-stripe{width:5px;height:22px;border-radius:3px}
.detail-title{font-size:16px;font-weight:500}
.dtabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.dtab{flex-shrink:0;padding:10px 16px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.dtab.active{color:var(--text);border-bottom-color:var(--text)}
.dbody{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.lhist-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.lhist-date{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:4px}
.lhist-entry{border-bottom:1px solid var(--border);padding:8px 0}
.lhist-entry:last-child{border-bottom:none;padding-bottom:0}
.lhist-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:4px}
.lhist-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.lhist-tag{font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:500}
.lhist-text{font-size:12px;line-height:1.6;color:var(--text)}
.lhist-review{font-size:12px;line-height:1.6;color:var(--text2);margin-top:4px;font-style:italic}

/* Weight tracker */
.wt-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.wt-stat{background:var(--c3b);border-radius:10px;padding:10px 12px;text-align:center}
.wt-stat-val{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--c3t);line-height:1}
.wt-stat-lbl{font-size:10px;color:var(--c3t);opacity:.7;margin-top:3px}
.wt-progress-wrap{margin-bottom:14px}
.wt-bar-track{height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.wt-bar-fill{height:10px;background:linear-gradient(90deg,var(--c3),#85E8B8);border-radius:5px;transition:width .6s ease}
.wt-bar-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px}
.wt-log-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:200px;overflow-y:auto}
.wt-log-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg);border-radius:8px}
.wt-log-date{font-family:var(--mono);font-size:10px;color:var(--text3)}
.wt-log-val{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--c3t)}
.wt-log-diff{font-family:var(--mono);font-size:10px}
.wt-log-diff.down{color:var(--c3)}
.wt-log-diff.up{color:var(--c2)}
.wt-input-row{display:flex;gap:8px;align-items:center}
.wt-input{font-family:var(--mono);font-size:16px;width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 14px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.wt-input:focus{border-color:var(--c3)}
.measure-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.measure-item{background:var(--bg);border-radius:9px;padding:10px 12px}
.measure-lbl{font-size:11px;color:var(--text3);margin-bottom:4px}
.measure-input{font-family:var(--mono);font-size:14px;width:100%;border:none;background:none;color:var(--text);outline:none;padding:0}

/* Action tool */
.at-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.at-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.at-dot{width:8px;height:8px;border-radius:50%}
.at-lbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.at-sub{font-size:10px;color:var(--text3);margin-left:auto}
.at-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.at-ta{font-family:var(--sans);font-size:12px;line-height:1.6;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;resize:none;width:100%;min-height:70px;outline:none;color:var(--text)}
.at-ta:focus{border-color:var(--border-mid)}
.at-ta::placeholder{color:var(--text3)}
.at-qb{background:var(--bg);border-radius:8px;padding:9px 11px}
.at-ql{font-size:10px;font-weight:500;letter-spacing:.04em;color:var(--text2);margin-bottom:3px;text-transform:uppercase}
.at-qt{font-size:12px;color:var(--text);margin-bottom:6px}
.at-qi{font-family:var(--sans);font-size:12px;width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;background:var(--surface);color:var(--text);outline:none}
.at-qi:focus{border-color:var(--border-mid)}
.logic-out{font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;max-height:200px;overflow-y:auto}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px}
.tchip{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;background:var(--purple-light);color:var(--purple)}
.action-next{font-family:var(--sans);font-size:12px;background:var(--c1b);border:1px solid var(--border);border-radius:8px;padding:9px 11px;resize:none;width:100%;height:65px;outline:none;color:var(--text)}

#v-rev .inner{padding:16px;display:flex;flex-direction:column;gap:14px;padding-bottom:24px}

.conf-wrap{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}

let ovWk=wkKey(new Date()),curDom=null,prevView='home',curTab=0,entjVisible=false;
function today(){return new Date().toISOString().slice(0,10)}
function nowTime(){const n=new Date();return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`}
function wkKey(d){const dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()-dt.getDay()+1);return dt.toISOString().slice(0,10)}
function wkLabel(k){const s=new Date(k),e=new Date(k);e.setDate(e.getDate()+6);return `${s.getMonth()+1}/${s.getDate()} – ${e.getMonth()+1}/${e.getDate()}`}
function getDayLogs(did,dk){
  if(!DB.logs[dk])DB.logs[dk]={};
  if(!DB.logs[dk][did])DB.logs[dk][did]=[];
  return DB.logs[dk][did];
}
function getStreak(){
  let s=0,d=new Date();d.setHours(0,0,0,0);
  while(true){
    const k=d.toISOString().slice(0,10);
    if(!Object.values(DB.logs[k]||{}).some(a=>Array.isArray(a)&&a.length>0))break;
    s++;d.setDate(d.getDate()-1);
  }
  return s;
}
function getMilestones(did){return DB.customMilestones?.[did]||DOMAINS.find(d=>d.id===did).milestones}
function getActions(did){return DB.customActions?.[did]||DOMAINS.find(d=>d.id===did).actions}

// ── Weight-adjusted progress (A: 50% milestone, 30% action, 20% checkin)
function weekPct(did,wk){
  const milestones=getMilestones(did);
  const actions=getActions(did);
  const ms=DB.milestones[did]||[];
  const mDone=milestones.filter((_,i)=>ms[i]).length;
  const mPct=(mDone/milestones.length)*100;
  const wAct=DB.actions[wk]?.[did]||[];
  const aDone=actions.filter((_,i)=>wAct[i]).length;
  const aPct=(aDone/actions.length)*100;
  const start=new Date(wk);let logged=0;
  for(let i=0;i<7;i++){
    const dt=new Date(start);dt.setDate(dt.getDate()+i);
    if((DB.logs[dt.toISOString().slice(0,10)]?.[did]||[]).length>0)logged++;
  }
  const cPct=(logged/7)*100;
  return Math.round(mPct*0.5+aPct*0.3+cPct*0.2);
}

function renderHeatmap(){
  document.getElementById('hm-lbls').innerHTML=['一','二','三','四','五','六','日'].map(d=>`<div class="hm-lbl">${d}</div>`).join('');
  const hmg=document.getElementById('hm-grid');hmg.innerHTML='';
  const end=new Date();end.setHours(0,0,0,0);
  const start=new Date(end);start.setDate(start.getDate()-27);
  while(start.getDay()!==1)start.setDate(start.getDate()-1);
  let d=new Date(start);
  while(d<=end){
    const k=d.toISOString().slice(0,10);
    const cnt=Object.values(DB.logs[k]||{}).reduce((s,a)=>s+(Array.isArray(a)?a.length:0),0);
    const op=cnt===0?0:Math.min(1,0.15+(cnt/8)*.85);
    const cell=document.createElement('div');cell.className='hm-cell';
    cell.style.background=cnt>0?`rgba(139,92,246,${op})`:'var(--border)';
    cell.title=`${k}·${cnt}条`;
    cell.innerHTML=`<span>${d.getDate()}</span>`;
    hmg.appendChild(cell);d.setDate(d.getDate()+1);
  }
}

// ── Weight Tracker
function renderWeightTracker(body){
  const wg=DB.weightGoal||{current:0,target:0,logs:[]};
  const logs=wg.logs||[];
  const latest=logs[logs.length-1]?.weight||wg.current||0;
  const start=wg.startWeight||wg.current||latest;
  const target=wg.target||0;
  const lost=start&&latest?Math.max(0,+(start-latest).toFixed(1)):0;
  const toGo=target&&latest?Math.max(0,+(latest-target).toFixed(1)):0;
  const totalGoal=start&&target?Math.max(0.1,+(start-target).toFixed(1)):1;
  const progPct=Math.min(100,Math.round((lost/totalGoal)*100));
  const ms=DB.measurements||{};

  body.innerHTML=`
    <div class="card" style="padding:14px;margin-bottom:10px">
      <div class="slbl" style="margin-bottom:10px">减脂目标设置</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">起始体重 (kg)</div>
          <input class="wt-input" id="wt-start" type="number" step="0.1" value="${wg.startWeight||''}" placeholder="例: 65.0">
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px">目标体重 (kg)</div>
          <input class="wt-input" id="wt-target" type="number" step="0.1" value="${target||''}" placeholder="例: 55.0">
        </div>
      </div>
      <button class="btn btn-dark" onclick="saveWeightGoal()" style="background:var(--c3)">保存目标</button>
    </div>

    ${start&&target?`
    <div class="card" style="padding:14px;margin-bottom:10px">
      <div class="slbl" style="margin-bottom:10px">当前进度</div>
      <div class="wt-summary">
        <div class="wt-stat"><div class="wt-stat-val">${latest||'--'}</div><div class="wt-stat-lbl">当前 kg</div></div>
        <div class="wt-stat"><div class="wt-stat-val" style="color:var(--c3)">${lost>0?'-'+lost:'0'}</div><div class="wt-stat-lbl">已减 kg</div></div>
        <div class="wt-stat"><div class="wt-stat-val" style="color:${toGo>0?'var(--c2)':'var(--c3)'}">${toGo>0?toGo+'↓':'达标!'}</div><div class="wt-stat-lbl">${toGo>0?'还差 kg':'🎉'}</div></div>
      </div>
      <div class="wt-progress-wrap">
        <div class="wt-bar-track"><div class="wt-bar-fill" style="width:${progPct}%"></div></div>
        <div class="wt-bar-labels"><span>${start}kg 起点</span><span>${progPct}%</span><span>${target}kg 目标</span></div>
      </div>
    </div>`:''}

    <div class="card" style="padding:14px;margin-bottom:10px">
      <div class="slbl" style="margin-bottom:10px">记录今日体重</div>
      <div class="wt-input-row">
        <input class="wt-input" id="wt-today" type="number" step="0.1" placeholder="今日体重 (kg)">
        <button class="btn btn-dark" onclick="logWeight()" style="width:auto;padding:10px 16px;background:var(--c3)">记录</button>
      </div>
      ${logs.length>0?`
      <div style="margin-top:12px">
        <div class="slbl" style="margin-bottom:6px">体重记录</div>
        <div class="wt-log-list">
          ${[...logs].reverse().slice(0,20).map((l,i,arr)=>{
            const prev=arr[i+1]?.weight;
            const diff=prev?+(l.weight-prev).toFixed(1):null;
            return `<div class="wt-log-item">
              <span class="wt-log-date">${l.date}</span>
              <span class="wt-log-val">${l.weight} kg</span>
              ${diff!==null?`<span class="wt-log-diff ${diff<=0?'down':'up'}">${diff>0?'+':''}${diff}kg</span>`:'<span></span>'}
            </div>`;
          }).join('')}
        </div>
      </div>`:''}
    </div>

    <div class="card" style="padding:14px">
      <div class="slbl" style="margin-bottom:10px">身体维度记录（选填）</div>
      <div class="measure-grid">
        ${[['waist','腰围 cm'],['hip','臀围 cm'],['chest','胸围 cm'],['thigh','大腿 cm']].map(([k,lbl])=>`
          <div class="measure-item">
            <div class="measure-lbl">${lbl}</div>
            <input class="measure-input" id="ms-${k}" type="number" step="0.1" value="${ms[k]||''}" placeholder="--" onchange="saveMeasure('${k}',this.value)">
          </div>`).join('')}
      </div>
      <button class="btn btn-dark" onclick="saveMeasures()" style="background:var(--c3);margin-top:10px">保存维度</button>
    </div>`;
}
function saveWeightGoal(){
  const s=parseFloat(document.getElementById('wt-start').value);
  const t=parseFloat(document.getElementById('wt-target').value);
  if(!DB.weightGoal)DB.weightGoal={logs:[]};
  if(s)DB.weightGoal.startWeight=s;

function logWeight(){

function saveMeasure(k,v){if(!DB.measurements)DB.measurements={};DB.measurements[k]=parseFloat(v)||0;save()}
function saveMeasures(){

}

async function atGen(){
  const task=document.getElementById('at-task').value.trim();if(!task){alert('请先描述工作内容');return}
  atTask=task;const btn=document.getElementById('at-gen');btn.textContent='生成中…';btn.disabled=true;
  document.getElementById('at-mid').style.display='block';
  document.getElementById('at-mid-body').innerHTML='<div class="ldots"><span>·</span><span>·</span><span>·</span></div>';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,
        system:'生成4个拆解问题，返回严格JSON无多余文字：{"questions":[{"key":"background","label":"背景","question":"问题"},{"key":"goal","label":"目的","question":"问题"},{"key":"decision","label":"决策","question":"问题"},{"key":"role","label":"我的角色","question":"问题"}]}问题15字内口语化。',
        messages:[{role:'user',content:`工作：${task}`}]})});
    const data=await res.json();
    atQs=JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim()).questions;
  }catch(e){atQs=[{key:'background',label:'背景',question:'谁交给你的？'},{key:'goal',label:'目的',question:'做完为了什么？'},{key:'decision',label:'决策',question:'结果用来做什么？'},{key:'role',label:'角色',question:'你负责哪部分？'}]}
  document.getElementById('at-mid-body').innerHTML=atQs.map(q=>`<div class="at-qb"><div class="at-ql">${q.label}</div><div class="at-qt">${q.question}</div><input class="at-qi" data-key="${q.key}" placeholder="你的回答…"></div>`).join('')+
    `<button class="btn btn-dark" id="at-analyze" onclick="atAnalyze()" style="background:var(--c5);margin-top:4px">分析底层逻辑 →</button>`;
  btn.textContent='重新生成';btn.disabled=false;
}
async function atAnalyze(){
  const inputs=document.querySelectorAll('#at-mid-body .at-qi');
  const qa=Array.from(inputs).map(i=>`${atQs.find(q=>q.key===i.dataset.key)?.label}：${i.value.trim()||'未填写'}`).join('\n');
  const btn=document.getElementById('at-analyze');btn.textContent='分析中…';btn.disabled=true;
  document.getElementById('at-right').style.display='block';
  document.getElementById('at-logic').innerHTML='<div class="ldots"><span>·</span><span>·</span><span>·</span></div>';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:900,
        system:'返回严格JSON无多余文字：{"logic":"底层逻辑300字内3-4段","tags":["词1","词2","词3"],"next_action":"下次可以…50字内"}',
        messages:[{role:'user',content:`工作：${atTask}\n背景：\n${qa}`}]})});
    const data=await res.json();
    const p=JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
    atLogic=p.logic||'';atTags=p.tags||[];atAction=p.next_action||'';
    document.getElementById('at-logic').textContent=atLogic;
    document.getElementById('at-tags').innerHTML=atTags.map(t=>`<span class="tchip">${t}</span>`).join('');
    document.getElementById('at-ap').style.display='block';
    document.getElementById('at-action-input').value=atAction;
  }catch(e){document.getElementById('at-logic').textContent='分析失败，请重试。'}
  btn.textContent='重新分析';btn.disabled=false;
}
function atSave(){
  const inputs=document.querySelectorAll('#at-mid-body .at-qi');const qa={};
  inputs.forEach(i=>{qa[i.dataset.key]=i.value.trim()});
  if(!DB.actionRecords)DB.actionRecords=[];
  DB.actionRecords.unshift({id:Date.now(),date:today(),task:atTask,qa,logic:atLogic,tags:atTags,action:document.getElementById('at-action-input').value.trim(),result:''});
  save();fireConfetti();renderDBody();
}

  if(DB.weightGoal?.logs?.length){const latest=DB.weightGoal.logs[DB.weightGoal.logs.length-1];summary+=`\n【体重】最新: ${latest.weight}kg, 目标: ${DB.weightGoal.target}kg`;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,
        system:`你是ENTJ型导师，帮助研二设计专业学生（目标：运动品牌产品规划）做周复盘。风格：理性、直接、克制、有洞察，像导师批改作业，不废话不煽情。600字内，自然段落，不用标题符号：
第一段：整体状态判断（2-3句）
第二段：最大亮点（具体）
第三段：最需改进（结合卡点，诚实）
第四段：下周三条建议（编号，可执行）
最后：一句总结，克制有力`,
        messages:[{role:'user',content:`本周（${wkLabel(wk)}）：${summary}`}]})});
    const data=await res.json();
    const review=data.content.map(i=>i.text||'').join('');
    if(!DB.reviews)DB.reviews={};DB.reviews[wk]=review;save();
    document.querySelector('#rev-btn .nbadge')?.remove();
    showEntjComment(ENTJ_LINES.review);renderRev();
  }catch(e){btn.textContent='生成失败，请重试';btn.disabled=false}
}
function renderRev(){
  const inner=document.getElementById('rev-inner');const wk=wkKey(new Date());
  const existing=DB.reviews?.[wk];
  const past=Object.entries(DB.reviews||{}).filter(([k])=>k!==wk).sort((a,b)=>b[0].localeCompare(a[0]));
  const isSun=new Date().getDay()===0;
  let html='';
  if(!existing){
    html+=`<div class="rev-trigger">
      <div class="rev-emoji">${isSun?'📋':'⏳'}</div>
      <div class="rev-title">${isSun?'周复盘时间到了':'复盘在周日触发'}</div>
      <div class="rev-sub">${isSun?'一键生成，E·导师用理性视角帮你看清这一周':'周日自动提醒，也可以随时手动触发'}</div>
      <button class="btn btn-dark" id="rev-start-btn" onclick="startReview()" style="max-width:220px;margin:0 auto">
        ${isSun?'生成本周复盘 →':'现在生成（预览）'}
      </button>
    </div>`;
  }else{
    html+=`<div class="slbl">本周复盘 · ${wkLabel(wk)}</div>
    <div class="rev-full">${existing}</div>
    <div style="text-align:right;margin-top:8px"><button class="btn-ghost" onclick="regenRev()">重新生成</button></div>`;
  }
  if(past.length){html+=`<div class="slbl" style="margin-top:4px">历史复盘</div>${past.map(([k,r])=>`<div class="rev-hist" onclick="showPastRev('${k}')"><div class="rev-hist-wk">W · ${wkLabel(k)}</div><div class="rev-hist-pre">${r.slice(0,80)}…</div></div>`).join('')}`;}
  inner.innerHTML=html;
}
function regenRev(){const wk=wkKey(new Date());delete DB.reviews[wk];save();renderRev();setTimeout(startReview,100)}
function showPastRev(wk){
  document.getElementById('modal-title').textContent='复盘 · '+wkLabel(wk);
  document.getElementById('modal-body').innerHTML=`<div class="rev-full">${DB.reviews[wk]}</div>`;
  document.getElementById('modal-ov').classList.add('open');
}
function closeModal(){document.getElementById('modal-ov').classList.remove('open')}

// ════════════════════════ EXPORT ════════════════════════
function doExport(){
  if(typeof XLSX==='undefined'){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=doExport;document.head.appendChild(s);return}
  const wb=XLSX.utils.book_new();
  const rows=[];
  Object.entries(DB.logs).sort().forEach(([date,dl])=>{
    DOMAINS.forEach(dom=>{
      (dl[dom.id]||[]).forEach(e=>{
        rows.push({'日期':date,'时间':e.time||'','领域':dom.name,'标签':Object.values(e.tags||{}).filter(Boolean).join('/'),'记录内容':Object.values(e.text||{}).filter(Boolean).join(' | '),'小复盘':e.minireview||'','能量感':e.energy||0,'导师点评':e.aiComment||''});
      });
    });
  });
  const ws=XLSX.utils.json_to_sheet(rows);ws['!cols']=[{wch:12},{wch:6},{wch:10},{wch:20},{wch:50},{wch:40},{wch:6},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'每日记录');
  if((DB.weightGoal?.logs||[]).length){
    const wr=(DB.weightGoal.logs||[]).map(l=>({'日期':l.date,'体重(kg)':l.weight}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(wr),'体重记录');
  }
  if(DB.actionRecords?.length){
    const ar=DB.actionRecords.map(r=>({'日期':r.date,'工作':r.task,'关键词':(r.tags||[]).join('/'),'逻辑':r.logic||'','下一步':r.action||'','结果':r.result||''}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ar),'实习行动分析');
  }
  XLSX.writeFile(wb,`五域成长_${today()}.xlsx`);
}
