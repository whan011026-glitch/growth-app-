<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F8F6F2">
<title>五域成长</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&family=Lora:ital,wght@0,400;1,400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:transparent;--surface:rgba(255,255,255,.55);--surface-solid:#fff;
  --border:rgba(255,255,255,.6);--border-mid:rgba(180,210,230,.8);
  --text:#2A2028;--text2:#5A4A52;--text3:#9A8A92;
  --sans:'Noto Sans SC',sans-serif;--mono:'DM Mono',monospace;--serif:'Lora',serif;
  --r:16px;--shadow:0 4px 24px rgba(100,160,200,.12);
  --glass:rgba(255,255,255,.65);--glass-border:rgba(255,255,255,.8);
  --c1:#E8456A;--c1b:rgba(255,255,255,.18);--c1t:#4A2030;
  --c2:#E8456A;--c2b:rgba(255,255,255,.18);--c2t:#4A2030;
  --c3:#E8456A;--c3b:rgba(255,255,255,.18);--c3t:#4A2030;
  --c4:#E8456A;--c4b:rgba(255,255,255,.18);--c4t:#4A2030;
  --c5:#E8456A;--c5b:rgba(255,255,255,.18);--c5t:#4A2030;
  --accent:#E8456A;
  --purple:#C0748A;--purple-light:rgba(232,69,106,.1);
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);color:var(--text);display:flex;flex-direction:column;position:relative}

/* ── Background image ── */
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:url('./bg.png') center center / cover no-repeat;
}
/* Subtle overlay to soften */
body::after{
  content:'';position:fixed;inset:0;z-index:-1;
  background:rgba(255,255,255,.08);
}

/* SVG mountain/cloud layer */
#bg-canvas{position:fixed;inset:0;z-index:-1;width:100%;height:100%;pointer-events:none}

.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;min-height:0}
.view.active{display:flex}

/* ── NAV ── */
#bnav{
  background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--glass-border);
  display:flex;padding:6px 0 calc(6px + var(--safe-b));flex-shrink:0;z-index:100;
}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 0;color:var(--text3);font-family:var(--sans);transition:color .2s;position:relative}
.nbtn.active{color:var(--text)}
.nbtn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.nbtn span{font-size:10px;font-weight:500}
.nbadge{position:absolute;top:3px;right:calc(50% - 18px);width:7px;height:7px;background:#E85D3C;border-radius:50%;border:1.5px solid white}

/* ── Glass card base ── */
.glass{
  background:rgba(255,255,255,.52);
  backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);
  border:1px solid rgba(255,255,255,.75);
  border-radius:var(--r);
  box-shadow:0 4px 24px rgba(180,120,130,.1),inset 0 1px 0 rgba(255,255,255,.8);
}
.card{background:rgba(255,255,255,.52);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border:1px solid rgba(255,255,255,.75);border-radius:var(--r);box-shadow:0 4px 24px rgba(180,120,130,.1),inset 0 1px 0 rgba(255,255,255,.8)}
.slbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:11px 20px;border-radius:24px;border:none;cursor:pointer;transition:all .18s;width:100%}
.btn-dark{background:var(--text);color:#fff}
.btn-dark:active{opacity:.8}
.btn-ghost{background:var(--glass);color:var(--text2);border:1px solid var(--glass-border);backdrop-filter:blur(8px);padding:7px 16px;width:auto;font-family:var(--sans);font-size:12px;border-radius:20px;cursor:pointer}
.divider{height:1px;background:var(--border-mid);margin:12px 0;opacity:.5}

/* ── Lace divider ── */
.lace{width:100%;height:16px;flex-shrink:0;overflow:hidden;opacity:.5}

/* ── Animations ── */
@keyframes cloudDrift{from{transform:translateX(0)}to{transform:translateX(30px)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fall{from{transform:translateY(-20px) rotate(0deg);opacity:1}to{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
@keyframes entjFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes spinSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes spinSlowR{from{transform:rotate(0)}to{transform:rotate(-360deg)}}
.ldots span{display:inline-block;animation:blink 1.2s infinite;font-size:18px}
.ldots span:nth-child(2){animation-delay:.2s}
.ldots span:nth-child(3){animation-delay:.4s}

/* ══════════════════════════════
   HOME
══════════════════════════════ */
#v-home{padding-bottom:16px}

.hero{position:relative;padding:20px 16px 16px;flex-shrink:0}
.hero-arcs{position:absolute;top:-40px;right:-60px;width:260px;height:260px;pointer-events:none;opacity:.7}
.arc-g1{transform-origin:130px 130px;animation:spinSlow 20s linear infinite}
.arc-g2{transform-origin:130px 130px;animation:spinSlowR 28s linear infinite}
.arc-g3{transform-origin:130px 130px;animation:spinSlow 36s linear infinite}
.arc-g4{transform-origin:130px 130px;animation:spinSlowR 16s linear infinite}
.arc-g5{transform-origin:130px 130px;animation:spinSlow 24s linear infinite}

.hero-content{position:relative;z-index:1}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hero-date{font-family:var(--mono);font-size:11px;color:var(--text3)}
.streak{display:flex;align-items:center;gap:5px;background:var(--text);color:#fff;font-family:var(--mono);font-size:12px;padding:4px 12px;border-radius:20px}
.quote-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.quote-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.quote-text{font-size:13px;line-height:1.7;color:var(--text);font-style:italic;font-family:var(--serif)}

.focus-strip{padding:0 16px;margin-bottom:4px}
.focus-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.focus-row::-webkit-scrollbar{display:none}
.focus-chip{flex-shrink:0;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:24px;padding:7px 14px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all .15s;min-width:110px}
.focus-chip:active{transform:scale(.96)}
.focus-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.focus-chip-name{font-size:12px;font-weight:500;white-space:nowrap;color:var(--text)}
.focus-chip-pct{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto}

.domain-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.dcard{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:all .2s}
.dcard-head{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none}
.dcard-accent{width:4px;border-radius:2px;flex-shrink:0;transition:height .2s}
.dcard-info{flex:1;min-width:0}
.dcard-name{font-size:14px;font-weight:500;color:var(--text)}
.dcard-status{font-size:11px;color:var(--text3);margin-top:2px}
.dcard-ring{width:34px;height:34px;flex-shrink:0}
.ring-track{fill:none;stroke:rgba(180,210,230,.4);stroke-width:3.5}
.ring-fill{fill:none;stroke-width:3.5;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dasharray .6s ease}
.ring-pct{font-family:var(--mono);font-size:9px;fill:var(--text);font-weight:500}
.dcard-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.dcard-body.open{max-height:2400px}
.dcard-inner{border-top:1px solid rgba(255,255,255,.5);padding:14px}

.item-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.item-row{display:flex;align-items:flex-start;gap:8px}
.item-check{width:19px;height:19px;border-radius:6px;border:1.5px solid rgba(180,210,230,.6);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px;background:rgba(255,255,255,.5)}
.item-check.done{border-color:transparent}
.item-check.done::after{content:'✓';font-size:10px;font-weight:600;color:#fff}
.item-text-wrap{flex:1;display:flex;align-items:center;gap:6px}
.item-text{font-size:12px;line-height:1.5;flex:1;color:var(--text)}
.item-text.done{color:var(--text3);text-decoration:line-through}
.item-edit-btn{font-size:13px;color:var(--text3);cursor:pointer;opacity:0;transition:opacity .15s;flex-shrink:0;background:none;border:none;padding:0 2px}
.item-row:hover .item-edit-btn{opacity:1}
.item-edit-input{font-family:var(--sans);font-size:12px;flex:1;border:1px solid var(--border-mid);border-radius:8px;padding:4px 8px;outline:none;background:rgba(255,255,255,.8);color:var(--text)}

.log-records{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.log-record-card{border-radius:12px;padding:11px 13px;position:relative;animation:fadeSlideUp .2s ease;border:1px solid rgba(255,255,255,.6);background:rgba(255,255,255,.5)}
.lrc-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:5px}
.lrc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.lrc-tag{font-size:10px;padding:2px 9px;border-radius:20px;color:#fff;font-weight:500}
.lrc-text{font-size:12px;line-height:1.6;color:var(--text);margin-bottom:3px}
.lrc-review{font-size:12px;line-height:1.6;color:var(--text2);border-top:1px solid rgba(180,210,230,.3);margin-top:6px;padding-top:6px;font-style:italic;font-family:var(--serif)}
.lrc-stars{font-size:11px;margin-top:3px}
.lrc-del{position:absolute;top:8px;right:10px;font-size:16px;cursor:pointer;background:none;border:none;opacity:.3;color:var(--text)}
.lrc-del:hover{opacity:.7}
.ai-chip{display:inline-flex;align-items:center;gap:5px;background:var(--purple-light);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--purple);margin-bottom:8px;border:1px solid rgba(139,92,246,.2)}
.ai-chip-mark{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.06em;opacity:.7}

.log-form{display:flex;flex-direction:column;gap:10px}
.log-step{background:rgba(255,255,255,.4);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,.6)}
.log-step-q{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px}
.tag-grid{display:flex;flex-wrap:wrap;gap:6px}
.tag-opt{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid rgba(180,210,230,.5);background:rgba(255,255,255,.6);color:var(--text2);cursor:pointer;transition:all .15s;backdrop-filter:blur(4px)}
.tag-opt.sel{color:#fff;border-color:transparent;font-weight:500}
.tag-opt:active{transform:scale(.94)}
.log-input{font-family:var(--sans);font-size:13px;line-height:1.6;color:var(--text);background:rgba(255,255,255,.7);border:1px solid rgba(180,210,230,.4);border-radius:12px;padding:10px 12px;resize:none;width:100%;min-height:68px;outline:none;transition:border-color .15s}
.log-input:focus{border-color:rgba(180,210,230,.8);background:rgba(255,255,255,.85)}
.log-input::placeholder{color:var(--text3)}
.minireview-input{font-family:var(--serif);font-size:13px;line-height:1.7;color:var(--text);background:rgba(255,255,255,.7);border:1px solid rgba(180,210,230,.4);border-radius:12px;padding:10px 12px;resize:none;width:100%;min-height:80px;outline:none;transition:all .15s;font-style:italic}
.minireview-input:focus{border-color:rgba(180,210,230,.8);background:rgba(255,255,255,.85)}
.minireview-input::placeholder{color:var(--text3)}
.energy-wrap{display:flex;align-items:center;gap:10px}
.stars{display:flex;gap:5px}
.star{font-size:24px;cursor:pointer;color:rgba(180,210,230,.5);transition:transform .1s}
.star.lit{color:#E8A020}
.star:active{transform:scale(1.3)}

/* ══════════════════════════════
   OVERVIEW
══════════════════════════════ */
#v-ov .inner{padding:16px;display:flex;flex-direction:column;gap:16px;padding-bottom:24px}
.week-nav{display:flex;align-items:center;gap:8px}
.week-nav button{font-family:var(--mono);font-size:13px;background:var(--glass);backdrop-filter:blur(8px);border:1px solid var(--glass-border);border-radius:20px;padding:5px 14px;cursor:pointer;color:var(--text2)}
.week-lbl{flex:1;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text)}

.entj-status-card{border-radius:var(--r);padding:16px 18px;background:linear-gradient(135deg,rgba(59,26,138,.85) 0%,rgba(109,40,217,.8) 60%,rgba(139,92,246,.75) 100%);color:#fff;display:flex;gap:14px;align-items:center;box-shadow:0 8px 32px rgba(139,92,246,.3);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2)}
.esc-avatar{width:52px;height:80px;flex-shrink:0;animation:entjFloat 3s ease-in-out infinite}
.esc-content{flex:1}
.esc-label{font-family:var(--mono);font-size:10px;opacity:.7;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.esc-text{font-size:13px;line-height:1.65;font-weight:300}
.esc-btn{margin-top:10px;font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-family:var(--sans)}

.arc-dashboard{display:flex;flex-direction:column;gap:8px}
.arc-strip{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.arc-strip:active{opacity:.9;transform:scale(.99)}
.arc-strip-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.arc-strip-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;color:var(--text)}
.arc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.arc-meta-item{font-family:var(--mono);font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px}
.arc-bar-track{height:5px;background:rgba(180,210,230,.3);border-radius:3px;margin-top:6px}
.arc-bar-fill{height:5px;border-radius:3px;transition:width .6s ease}
.arc-pct{font-family:var(--mono);font-size:16px;font-weight:500;flex-shrink:0;min-width:38px;text-align:right}

.hm-lbls{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.hm-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);text-align:center}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hm-cell{aspect-ratio:1;border-radius:5px;background:rgba(180,210,230,.2)}
.hm-cell span{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.85)}

.bp-card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin-bottom:8px}
.bp-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bp-dot{width:9px;height:9px;border-radius:50%}
.bp-name{font-size:13px;font-weight:500;color:var(--text)}
.bp-input{font-family:var(--sans);font-size:12px;width:100%;border:1px solid rgba(180,210,230,.4);border-radius:10px;padding:8px 12px;background:rgba(255,255,255,.6);color:var(--text);outline:none;transition:all .15s}
.bp-input:focus{border-color:rgba(180,210,230,.8);background:rgba(255,255,255,.85)}
.bp-input::placeholder{color:var(--text3)}
.bp-save{margin-top:7px;font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid rgba(180,210,230,.5);background:rgba(255,255,255,.6);color:var(--text2);cursor:pointer;font-family:var(--sans)}

/* ══════════════════════════════
   DETAIL
══════════════════════════════ */
#v-detail{background:transparent}
.detail-hdr{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--text2);padding:0 4px;line-height:1}
.detail-stripe{width:5px;height:22px;border-radius:3px}
.detail-title{font-size:16px;font-weight:500;color:var(--text)}
.dtabs{display:flex;background:var(--glass);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border);flex-shrink:0;overflow-x:auto}
.dtab{flex-shrink:0;padding:10px 16px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.dtab.active{color:var(--text);border-bottom-color:var(--text)}
.dbody{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}

.lhist-item{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:14px;padding:12px 14px}
.lhist-date{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:4px}
.lhist-entry{border-bottom:1px solid rgba(180,210,230,.2);padding:8px 0}
.lhist-entry:last-child{border-bottom:none;padding-bottom:0}
.lhist-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:4px}
.lhist-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.lhist-tag{font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:500}
.lhist-text{font-size:12px;line-height:1.6;color:var(--text)}
.lhist-review{font-size:12px;line-height:1.6;color:var(--text2);margin-top:4px;font-style:italic;font-family:var(--serif)}

.wt-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.wt-stat{background:rgba(61,189,125,.1);border-radius:12px;padding:10px 12px;text-align:center;border:1px solid rgba(61,189,125,.2)}
.wt-stat-val{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--c3t);line-height:1}
.wt-stat-lbl{font-size:10px;color:var(--c3t);opacity:.7;margin-top:3px}
.wt-progress-wrap{margin-bottom:14px}
.wt-bar-track{height:10px;background:rgba(180,210,230,.3);border-radius:5px;overflow:hidden}
.wt-bar-fill{height:10px;background:linear-gradient(90deg,var(--c3),#85E8B8);border-radius:5px;transition:width .6s ease}
.wt-bar-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px}
.wt-log-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:200px;overflow-y:auto}
.wt-log-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:rgba(255,255,255,.5);border-radius:8px}
.wt-log-date{font-family:var(--mono);font-size:10px;color:var(--text3)}
.wt-log-val{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--c3t)}
.wt-log-diff{font-family:var(--mono);font-size:10px}
.wt-log-diff.down{color:var(--c3)}.wt-log-diff.up{color:var(--c2)}
.wt-input-row{display:flex;gap:8px;align-items:center}
.wt-input{font-family:var(--mono);font-size:16px;width:100%;border:1px solid rgba(180,210,230,.4);border-radius:12px;padding:10px 14px;background:rgba(255,255,255,.7);color:var(--text);outline:none;transition:all .15s}
.wt-input:focus{border-color:var(--c3);background:rgba(255,255,255,.9)}
.measure-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.measure-item{background:rgba(255,255,255,.5);border-radius:10px;padding:10px 12px;border:1px solid rgba(180,210,230,.3)}
.measure-lbl{font-size:11px;color:var(--text3);margin-bottom:4px}
.measure-input{font-family:var(--mono);font-size:14px;width:100%;border:none;background:none;color:var(--text);outline:none;padding:0}

.at-panel{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:var(--r);overflow:hidden}
.at-head{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.4);display:flex;align-items:center;gap:8px}
.at-dot{width:8px;height:8px;border-radius:50%}
.at-lbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.at-sub{font-size:10px;color:var(--text3);margin-left:auto}
.at-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.at-ta{font-family:var(--sans);font-size:12px;line-height:1.6;background:rgba(255,255,255,.6);border:1px solid rgba(180,210,230,.4);border-radius:10px;padding:9px 11px;resize:none;width:100%;min-height:70px;outline:none;color:var(--text)}
.at-ta::placeholder{color:var(--text3)}
.at-qb{background:rgba(255,255,255,.4);border-radius:10px;padding:9px 11px;border:1px solid rgba(255,255,255,.5)}
.at-ql{font-size:10px;font-weight:500;letter-spacing:.04em;color:var(--text2);margin-bottom:3px;text-transform:uppercase}
.at-qt{font-size:12px;color:var(--text);margin-bottom:6px}
.at-qi{font-family:var(--sans);font-size:12px;width:100%;border:1px solid rgba(180,210,230,.4);border-radius:8px;padding:6px 10px;background:rgba(255,255,255,.7);color:var(--text);outline:none}
.logic-out{font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;max-height:200px;overflow-y:auto}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px}
.tchip{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;background:var(--purple-light);color:var(--purple);border:1px solid rgba(139,92,246,.2)}
.action-next{font-family:var(--sans);font-size:12px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);border-radius:10px;padding:9px 11px;resize:none;width:100%;height:65px;outline:none;color:var(--text)}
.ar-card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:12px;padding:12px 14px}
.ar-date{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:5px}
.ar-task{font-size:13px;font-weight:500;margin-bottom:4px;color:var(--text)}
.ar-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.ar-logic{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.ar-result{background:rgba(255,255,255,.4);border-radius:8px;padding:7px 10px}
.ar-rl{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.ar-rt{font-size:11px;color:var(--text2)}

// ── AI request queue (prevent 429) ──
const _aiQueue=[];
let _aiRunning=false;
async function queueAI(fn){
  return new Promise((resolve,reject)=>{
    _aiQueue.push({fn,resolve,reject});
    if(!_aiRunning) drainAIQueue();
  });
}
async function drainAIQueue(){
  if(_aiRunning||_aiQueue.length===0)return;
  _aiRunning=true;
  const {fn,resolve,reject}=_aiQueue.shift();
  try{resolve(await fn())}catch(e){reject(e)}
  _aiRunning=false;
  if(_aiQueue.length>0){
    setTimeout(drainAIQueue, 1200); // 1.2s between requests
  }
}
async function kimiCall(messages, maxTokens){
  return queueAI(async()=>{
    const res=await fetch('https://api.deepseek.com/v1/chat/completions',{

      body:JSON.stringify({model:'deepseek-chat',max_tokens:maxTokens,messages})
    });
    if(!res.ok){const e=await res.text();throw new Error(res.status+': '+e)}
    const data=await res.json();
    return data.choices[0].message.content;
  });
}

function getStreak(){

  while(true){
    const k=d.toISOString().slice(0,10);
    if(!Object.values(DB.logs[k]||{}).some(a=>Array.isArray(a)&&a.length>0))break;
    s++;d.setDate(d.getDate()-1);
  }

// ── Weight-adjusted progress (A: 50% milestone, 30% action, 20% checkin)
function weekPct(did,wk){
  const milestones=getMilestones(did);
  const actions=getActions(did);
  const ms=DB.milestones[did]||[];
  const mDone=milestones.filter((_,i)=>ms[i]).length;
  const mPct=(mDone/milestones.length)*100;
  const wAct=DB.actions[wk]?.[did]||[];
  const aDone=actions.filter((_,i)=>wAct[i]).length;
  const aPct=(aDone/actions.length)*100;
  const start=new Date(wk);let logged=0;
  for(let i=0;i<7;i++){
    const dt=new Date(start);dt.setDate(dt.getDate()+i);
    if((DB.logs[dt.toISOString().slice(0,10)]?.[did]||[]).length>0)logged++;
  }
  const cPct=(logged/7)*100;
  // For internship: action records this week also count
  let actionBonus=0;
  if(did==='d1'){
    const wkStart=new Date(wk),wkEnd=new Date(wk);wkEnd.setDate(wkEnd.getDate()+7);
    const wkRecords=(DB.actionRecords||[]).filter(r=>r.date>=wk&&r.date<wkEnd.toISOString().slice(0,10));
    actionBonus=Math.min(10,wkRecords.length*3); // up to 10% bonus
  }
  return Math.min(100,Math.round(mPct*0.5+aPct*0.3+cPct*0.2+actionBonus));
}

function renderHeatmap(){
  document.getElementById('hm-lbls').innerHTML=['一','二','三','四','五','六','日'].map(d=>`<div class="hm-lbl">${d}</div>`).join('');
  const hmg=document.getElementById('hm-grid');hmg.innerHTML='';
  const end=new Date();end.setHours(0,0,0,0);
  const start=new Date(end);start.setDate(start.getDate()-27);
  while(start.getDay()!==1)start.setDate(start.getDate()-1);
  let d=new Date(start);
  while(d<=end){
    const k=d.toISOString().slice(0,10);
    const dayLogs=DB.logs[k]||{};
    const cnt=Object.values(dayLogs).reduce((s,a)=>s+(Array.isArray(a)?a.length:0),0);
    // avg energy across all entries today
    let totalE=0,countE=0;
    Object.values(dayLogs).forEach(arr=>{if(Array.isArray(arr))arr.forEach(e=>{if(e.energy){totalE+=e.energy;countE++}})});
    const avgE=countE>0?totalE/countE:0;
    // color: low energy=cool blue, high energy=warm rose
    const op=cnt===0?0:Math.min(1,0.2+(cnt/6)*.8);
    var cr=Math.round(180+avgE*10),cg=Math.round(120-avgE*5),cb=Math.round(160-avgE*8);
    const cell=document.createElement('div');cell.className='hm-cell';
    cell.style.background=cnt>0?('rgba('+cr+','+cg+','+cb+','+op+')'):'rgba(180,200,210,.15)';
    cell.title=`${k}·${cnt}条`;
    cell.innerHTML=`<span>${d.getDate()}</span>`;
    hmg.appendChild(cell);d.setDate(d.getDate()+1);
  }
}

  `;

  (DB.thesisOutline||[]).forEach((item,i)=>{
    const el=document.getElementById('ti-'+i);

  // Recent logs
  const logs=Object.keys(DB.logs).sort().reverse().filter(dk=>(DB.logs[dk]['d2']||[]).length>0).slice(0,6);
  if(logs.length){
    const lcard=document.createElement('div');lcard.className='card';lcard.style.padding='14px';
    lcard.innerHTML=`<div class="slbl" style="margin-bottom:8px">最近论文日志</div>
      ${logs.map(dk=>{
        const entries=DB.logs[dk]['d2']||[];
        return entries.map(e=>`<div class="lhist-entry"><div class="lhist-time">${dk} ${e.time||''}</div>
          ${Object.values(e.text||{}).filter(Boolean).map(t=>`<div class="lhist-text">${t}</div>`).join('')}
          ${e.minireview?`<div class="lhist-review">「${e.minireview}」</div>`:''}
        </div>`).join('');
      }).join('')}`;
    body.appendChild(lcard);
  }
}

function thesisItemHTML(item,i){
  var szMap={h1:'16px',h2:'14px',h3:'13px',p:'12px'};
  var wMap={h1:'700',h2:'600',h3:'500',p:'400'};
  var pMap={h1:'0',h2:'12px',h3:'24px',p:'24px'};
  var phMap={h1:'第一章标题',h2:'第一节标题',h3:'小节标题',p:'段落说明'};
  var bg=item.done?'rgba(232,69,106,.6)':'rgba(255,255,255,.5)';
  var clr=item.done?'var(--text3)':'var(--text)';
  var td=item.done?'line-through':'none';
  var chk=item.done?'<span style="color:#fff;font-size:10px">✓</span>':'';
  var h='<div style="display:flex;align-items:center;gap:6px;padding-left:'+pMap[item.type]+'">';
  h+='<div onclick="toggleThesisItem('+i+')" style="width:16px;height:16px;border-radius:4px;border:1.5px solid rgba(180,180,180,.5);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:'+bg+'">'+chk+'</div>';
  h+='<input id="ti-'+i+'" onchange="updateThesisItem('+i+',this.value)" placeholder="'+phMap[item.type]+'" ';
  h+='style="flex:1;border:none;background:transparent;font-size:'+szMap[item.type]+';font-weight:'+wMap[item.type]+';color:'+clr+';outline:none;text-decoration:'+td+';font-family:var(--sans)">';
  h+='<span onclick="deleteThesisItem('+i+')" style="font-size:16px;color:var(--text3);cursor:pointer;opacity:.4;flex-shrink:0">×</span>';
  h+='</div>';
  return h;
}

function toggleThesisItem(i){

function deleteThesisItem(i){

    </div>

        <div style="display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:rgba(255,255,255,.45);border-radius:10px;border:1px solid rgba(255,255,255,.6)">
          <div onclick="freeListToggle('${dbKey}',${i})" style="width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(180,180,180,.5);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:${item.done?'rgba(232,69,106,.6)':'rgba(255,255,255,.5)'}">

          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;color:${item.done?'var(--text3)':'var(--text)'};text-decoration:${item.done?'line-through':'none'};margin-bottom:3px">${item.title}</div>

function freeListAdd(dbKey){
  const title=prompt('添加什么？（书名、视频、文章等）');
  if(!title)return;
  const note=prompt('备注（可跳过）')||'';
  if(!DB[dbKey])DB[dbKey]=[];
  DB[dbKey].unshift({title,note,done:false,addedAt:new Date().toISOString().slice(0,10)});
  save();renderDBody();
}
function freeListToggle(dbKey,i){
  if(!DB[dbKey])return;
  DB[dbKey][i].done=!DB[dbKey][i].done;save();renderDBody();
}
function freeListDelete(dbKey,i){
  if(!confirm('删除这条？'))return;
  DB[dbKey].splice(i,1);save();renderDBody();
}

async function atGen(){
  const task=document.getElementById('at-task').value.trim();if(!task){alert('请先描述工作内容');return}
  atTask=task;const btn=document.getElementById('at-gen');btn.textContent='生成中…';btn.disabled=true;
  document.getElementById('at-mid').style.display='block';
  document.getElementById('at-mid-body').innerHTML='<div class="ldots"><span>·</span><span>·</span><span>·</span></div>';
  try{
    const res=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KIMI_KEY},
      body:JSON.stringify({model:'deepseek-chat',max_tokens:500,
        messages:[{role:'system',content:'生成4个拆解问题，返回严格JSON无多余文字：{"questions":[{"key":"background","label":"背景","question":"问题"},{"key":"goal","label":"目的","question":"问题"},{"key":"decision","label":"决策","question":"问题"},{"key":"role","label":"我的角色","question":"问题"}]}问题15字内口语化。'},{role:'user',content:`工作：${task}`}]})});
    const data=await res.json();
    atQs=JSON.parse(data.choices[0].message.content.replace(/```json|```/g,'').trim()).questions;
  }catch(e){atQs=[{key:'background',label:'背景',question:'谁交给你的？'},{key:'goal',label:'目的',question:'做完为了什么？'},{key:'decision',label:'决策',question:'结果用来做什么？'},{key:'role',label:'角色',question:'你负责哪部分？'}]}
  document.getElementById('at-mid-body').innerHTML=atQs.map(q=>`<div class="at-qb"><div class="at-ql">${q.label}</div><div class="at-qt">${q.question}</div><input class="at-qi" data-key="${q.key}" placeholder="你的回答…"></div>`).join('')+
    `<button class="btn btn-dark" id="at-analyze" onclick="atAnalyze()" style="background:var(--c5);margin-top:4px">分析底层逻辑 →</button>`;
  btn.textContent='重新生成';btn.disabled=false;
}
async function atAnalyze(){
  const inputs=document.querySelectorAll('#at-mid-body .at-qi');
  const qa=Array.from(inputs).map(i=>`${atQs.find(q=>q.key===i.dataset.key)?.label}：${i.value.trim()||'未填写'}`).join('\n');
  const btn=document.getElementById('at-analyze');btn.textContent='分析中…';btn.disabled=true;
  document.getElementById('at-right').style.display='block';
  document.getElementById('at-logic').innerHTML='<div class="ldots"><span>·</span><span>·</span><span>·</span></div>';
  try{
    const res=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KIMI_KEY},
      body:JSON.stringify({model:'deepseek-chat',max_tokens:900,
        messages:[{role:'system',content:'返回严格JSON无多余文字：{"logic":"底层逻辑300字内3-4段","tags":["词1","词2","词3"],"next_action":"下次可以…50字内"}'},{role:'user',content:`工作：${atTask}\n背景：\n${qa}`}]})});
    const data=await res.json();
    const p=JSON.parse(data.choices[0].message.content.replace(/```json|```/g,'').trim());
    atLogic=p.logic||'';atTags=p.tags||[];atAction=p.next_action||'';
    document.getElementById('at-logic').textContent=atLogic;
    document.getElementById('at-tags').innerHTML=atTags.map(t=>`<span class="tchip">${t}</span>`).join('');
    document.getElementById('at-ap').style.display='block';
    document.getElementById('at-action-input').value=atAction;
  }catch(e){document.getElementById('at-logic').textContent='分析失败，请重试。'}
  btn.textContent='重新分析';btn.disabled=false;
}
function atSave(){
  const inputs=document.querySelectorAll('#at-mid-body .at-qi');const qa={};
  inputs.forEach(i=>{qa[i.dataset.key]=i.value.trim()});
  if(!DB.actionRecords)DB.actionRecords=[];
  DB.actionRecords.unshift({id:Date.now(),date:today(),task:atTask,qa,logic:atLogic,tags:atTags,action:document.getElementById('at-action-input').value.trim(),result:''});
  save();fireConfetti();renderDBody();
}
function atEditR(i){document.getElementById('atri-'+i).style.display='block';document.getElementById('atrinp-'+i).focus()}
function atSaveR(i){DB.actionRecords[i].result=document.getElementById('atrinp-'+i).value.trim();save();renderDBody()}

// ════════════════════════ REVIEW ════════════════════════
async function startReview(){
  const wk=wkKey(new Date());const btn=document.getElementById('rev-start-btn');btn.textContent='生成中…';btn.disabled=true;
  let summary='';
  DOMAINS.forEach(dom=>{
    summary+=`\n【${dom.name}】`;
    const start=new Date(wk);
    for(let i=0;i<7;i++){
      const d=new Date(start);d.setDate(d.getDate()+i);
      const k=d.toISOString().slice(0,10);
      const entries=DB.logs[k]?.[dom.id]||[];
      if(entries.length){
        summary+=`\n  ${k}(${entries.length}条):`;
        entries.forEach(e=>{const tags=Object.values(e.tags||{}).filter(Boolean).join('、');const texts=Object.values(e.text||{}).filter(Boolean).join(' ');summary+=` [${tags} ${texts} ${e.minireview||''}能量${e.energy}/5]`});
      }
    }
    const ms=DB.milestones[dom.id]||[];const done=getMilestones(dom.id).filter((_,i)=>ms[i]);
    if(done.length)summary+=`\n  里程碑: ${done.join('、')}`;
    const wAct=DB.actions[wk]?.[dom.id]||[];
    summary+=`\n  行动: ${getActions(dom.id).filter((_,i)=>wAct[i]).length}/${getActions(dom.id).length}`;
    const bp=DB.blockpoints?.[dom.id];if(bp)summary+=`\n  卡点: ${bp}`;
  });
  if(DB.weightGoal?.logs?.length){const latest=DB.weightGoal.logs[DB.weightGoal.logs.length-1];summary+=`\n【体重】最新: ${latest.weight}kg, 目标: ${DB.weightGoal.target}kg`;}
  try{
    const res=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KIMI_KEY},
      body:JSON.stringify({model:'deepseek-chat',max_tokens:1500,
        messages:[{role:'system',content:`你是ENTJ型导师，帮助研二设计专业学生（目标：运动品牌产品规划）做周复盘。风格：理性、直接、克制、有洞察，像导师批改作业，不废话不煽情。600字内，自然段落，不用标题符号：\n第一段：整体状态判断（2-3句）\n第二段：最大亮点（具体）\n第三段：最需改进（结合卡点，诚实）\n第四段：下周三条建议（编号，可执行）\n最后：一句总结，克制有力`},{role:'user',content:`本周（${wkLabel(wk)}）：${summary}`}]})});
    const data=await res.json();
    const review=data.choices[0].message.content;
    if(!DB.reviews)DB.reviews={};DB.reviews[wk]=review;save();
    document.querySelector('#rev-btn .nbadge')?.remove();
    showEntjComment(ENTJ_LINES.review);renderRev();
  }catch(e){btn.textContent='生成失败，请重试';btn.disabled=false}
}
function renderRev(){
  const inner=document.getElementById('rev-inner');const wk=wkKey(new Date());
  const existing=DB.reviews?.[wk];
  const past=Object.entries(DB.reviews||{}).filter(([k])=>k!==wk).sort((a,b)=>b[0].localeCompare(a[0]));
  const isSun=new Date().getDay()===0;
  let html='';
  if(!existing){
    html+=`<div class="rev-trigger">
      <div class="rev-emoji">${isSun?'📋':'⏳'}</div>
      <div class="rev-title">${isSun?'周复盘时间到了':'复盘在周日触发'}</div>
      <div class="rev-sub">${isSun?'一键生成，E·导师用理性视角帮你看清这一周':'周日自动提醒，也可以随时手动触发'}</div>
      <button class="btn btn-dark" id="rev-start-btn" onclick="startReview()" style="max-width:220px;margin:0 auto">
        ${isSun?'生成本周复盘 →':'现在生成（预览）'}
      </button>
    </div>`;
  }else{
    html+=`<div class="slbl">本周复盘 · ${wkLabel(wk)}</div>
    <div class="rev-full">${existing}</div>
    <div style="text-align:right;margin-top:8px"><button class="btn-ghost" onclick="regenRev()">重新生成</button></div>`;
  }
  if(past.length){html+=`<div class="slbl" style="margin-top:4px">历史复盘</div>${past.map(([k,r])=>`<div class="rev-hist" onclick="showPastRev('${k}')"><div class="rev-hist-wk">W · ${wkLabel(k)}</div><div class="rev-hist-pre">${r.slice(0,80)}…</div></div>`).join('')}`;}
  inner.innerHTML=html;
}
function regenRev(){const wk=wkKey(new Date());delete DB.reviews[wk];save();renderRev();setTimeout(startReview,100)}
function showPastRev(wk){
  document.getElementById('modal-title').textContent='复盘 · '+wkLabel(wk);
  document.getElementById('modal-body').innerHTML=`<div class="rev-full">${DB.reviews[wk]}</div>`;
  document.getElementById('modal-ov').classList.add('open');
}
function closeModal(){document.getElementById('modal-ov').classList.remove('open')}

// ════════════════════════ EXPORT ════════════════════════
function doExport(){
  if(typeof XLSX==='undefined'){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=doExport;document.head.appendChild(s);return}
  const wb=XLSX.utils.book_new();
  const rows=[];
  Object.entries(DB.logs).sort().forEach(([date,dl])=>{
    DOMAINS.forEach(dom=>{
      (dl[dom.id]||[]).forEach(e=>{
        rows.push({'日期':date,'时间':e.time||'','领域':dom.name,'标签':Object.values(e.tags||{}).filter(Boolean).join('/'),'记录内容':Object.values(e.text||{}).filter(Boolean).join(' | '),'小复盘':e.minireview||'','能量感':e.energy||0,'导师点评':e.aiComment||''});
      });
    });
  });
  const ws=XLSX.utils.json_to_sheet(rows);ws['!cols']=[{wch:12},{wch:6},{wch:10},{wch:20},{wch:50},{wch:40},{wch:6},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'每日记录');
  if((DB.weightGoal?.logs||[]).length){
    const wr=(DB.weightGoal.logs||[]).map(l=>({'日期':l.date,'体重(kg)':l.weight}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(wr),'体重记录');
  }
  if(DB.actionRecords?.length){
    const ar=DB.actionRecords.map(r=>({'日期':r.date,'工作':r.task,'关键词':(r.tags||[]).join('/'),'逻辑':r.logic||'','下一步':r.action||'','结果':r.result||''}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ar),'实习行动分析');
  }
  XLSX.writeFile(wb,`五域成长_${today()}.xlsx`);
}
