<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F5F0">
<title>五域成长</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--surface:#FFF;--border:#E4DED5;--border-mid:#C9C2B8;
  --text:#16150E;--text2:#6A6760;--text3:#A9A5A0;
  --sans:'Noto Sans SC',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;--shadow:0 2px 8px rgba(0,0,0,.06);
  --c1:#1B3B4B;--c1b:#E6F1F5;
  --c2:#3E2112;--c2b:#F6EDE5;
  --c3:#103D20;--c3b:#E5F4EB;
  --c4:#3B1035;--c4b:#F4E6F3;
  --c5:#101F3E;--c5b:#E6EBF5;
  --purple:#5B2D8E;--purple-light:#EDE8F7;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);color:var(--text);display:flex;flex-direction:column}
.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;min-height:0}
.view.active{display:flex}

/* NAV */
#bnav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding:6px 0 calc(6px + var(--safe-b));flex-shrink:0;z-index:100}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 0;color:var(--text3);font-family:var(--sans);transition:color .15s;position:relative}
.nbtn.active{color:var(--text)}
.nbtn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.nbtn span{font-size:10px;font-weight:500}
.nbadge{position:absolute;top:3px;right:calc(50% - 18px);width:7px;height:7px;background:#E85D3C;border-radius:50%;border:1.5px solid var(--surface)}

/* SHARED */
.slbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow)}
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:11px 20px;border-radius:9px;border:none;cursor:pointer;transition:all .15s;width:100%}
.btn-dark{background:var(--text);color:var(--surface)}
.btn-dark:active{opacity:.8}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border-mid);padding:7px 14px;width:auto;font-family:var(--sans);font-size:12px;border-radius:7px;cursor:pointer}
.divider{height:1px;background:var(--border);margin:10px 0}

/* ANIMATIONS */
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
@keyframes slideup{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fall{from{transform:translateY(-20px) rotate(0deg);opacity:1}to{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes entj-in{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.slideup{animation:slideup .25s ease forwards}
.ldots span{display:inline-block;animation:blink 1.2s infinite;font-size:18px}
.ldots span:nth-child(2){animation-delay:.2s}
.ldots span:nth-child(3){animation-delay:.4s}

/* ═══ ENTJ MASCOT ═══ */
#entj-float{
  position:fixed;bottom:calc(70px + var(--safe-b));right:14px;
  z-index:150;display:flex;flex-direction:column;align-items:flex-end;gap:8px;
}
#entj-avatar{
  width:48px;height:48px;cursor:pointer;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.15));
  transition:transform .2s;flex-shrink:0;
}
#entj-avatar:hover{transform:scale(1.08)}
#entj-bubble{
  display:none;background:var(--surface);border:1px solid var(--border);
  border-radius:12px 12px 2px 12px;padding:10px 13px;
  max-width:200px;font-size:12px;line-height:1.6;color:var(--text);
  box-shadow:var(--shadow);animation:entj-in .2s ease;
  position:relative;
}
#entj-bubble::after{
  content:'';position:absolute;bottom:-1px;right:-1px;
  width:10px;height:10px;background:var(--surface);
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  clip-path:polygon(100% 0,100% 100%,0 100%);
}
#entj-bubble .entj-name{font-family:var(--mono);font-size:9px;color:var(--purple);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}

/* ═══ HOME ═══ */
#v-home{padding-bottom:16px}
.hero{padding:18px 16px 14px;flex-shrink:0}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hero-date{font-family:var(--mono);font-size:11px;color:var(--text3)}
.streak{display:flex;align-items:center;gap:5px;background:var(--text);color:var(--surface);font-family:var(--mono);font-size:12px;padding:4px 11px;border-radius:20px}
.quote-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;box-shadow:var(--shadow)}
.quote-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.quote-text{font-size:13px;line-height:1.6;color:var(--text);font-weight:300}

.focus-strip{padding:0 16px;margin-bottom:4px}
.focus-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.focus-row::-webkit-scrollbar{display:none}
.focus-chip{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 11px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all .15s;min-width:110px}
.focus-chip:active{transform:scale(.97)}
.focus-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.focus-chip-name{font-size:12px;font-weight:500;white-space:nowrap}
.focus-chip-pct{font-family:var(--mono);font-size:11px;color:var(--text3);margin-left:auto}

.domain-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}

/* Domain card */
.dcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.dcard-head{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none}
.dcard-stripe{width:4px;border-radius:2px;flex-shrink:0;transition:height .2s}
.dcard-info{flex:1;min-width:0}
.dcard-name{font-size:14px;font-weight:500}
.dcard-status{font-size:11px;color:var(--text3);margin-top:2px}
.dcard-ring{width:32px;height:32px;flex-shrink:0}
.dcard-ring-track{fill:none;stroke:var(--border);stroke-width:3}
.dcard-ring-fill{fill:none;stroke-width:3;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dasharray .4s ease}
.dcard-ring-pct{font-family:var(--mono);font-size:9px;fill:var(--text)}
.dcard-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.dcard-body.open{max-height:2000px}
.dcard-inner{border-top:1px solid var(--border);padding:14px}

/* Item rows (milestones/actions) */
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.item-row{display:flex;align-items:flex-start;gap:8px}
.item-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border-mid);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px}
.item-check.done{border-color:transparent}
.item-check.done::after{content:'✓';font-size:10px;font-weight:500;color:#fff}
.item-text-wrap{flex:1;display:flex;align-items:center;gap:6px}
.item-text{font-size:12px;line-height:1.5;flex:1}
.item-text.done{color:var(--text3);text-decoration:line-through}
.item-edit-btn{font-size:13px;color:var(--text3);cursor:pointer;opacity:0;transition:opacity .15s;flex-shrink:0;background:none;border:none;padding:0 2px}
.item-row:hover .item-edit-btn{opacity:1}
.item-edit-input{font-family:var(--sans);font-size:12px;flex:1;border:1px solid var(--border-mid);border-radius:6px;padding:4px 8px;outline:none;background:var(--bg);color:var(--text)}

/* Log records (saved entries) */
.log-records{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.log-record-card{background:var(--bg);border-radius:9px;padding:11px 13px;position:relative;animation:slideup .2s ease}
.lrc-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:5px}
.lrc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.lrc-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text2)}
.lrc-text{font-size:12px;line-height:1.6;color:var(--text);margin-bottom:3px}
.lrc-stars{color:#E8A020;font-size:11px}
.lrc-del{position:absolute;top:8px;right:10px;font-size:16px;color:var(--text3);cursor:pointer;background:none;border:none;opacity:.5}
.lrc-del:hover{opacity:1}
.ai-comment-card{background:var(--purple-light);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--purple);line-height:1.6;display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;border-left:3px solid var(--purple)}
.ai-comment-card .entj-mark{font-family:var(--mono);font-size:9px;letter-spacing:.06em;flex-shrink:0;margin-top:2px}

/* Log form */
.log-form{display:flex;flex-direction:column;gap:10px}
.log-step{background:var(--bg);border-radius:9px;padding:12px}
.log-step-q{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px}
.tag-grid{display:flex;flex-wrap:wrap;gap:6px}
.tag-opt{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.tag-opt.sel{color:#fff;border-color:transparent}
.tag-opt:active{transform:scale(.95)}
.log-input{font-family:var(--sans);font-size:13px;line-height:1.6;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;resize:none;width:100%;min-height:70px;outline:none;transition:border-color .15s}
.log-input:focus{border-color:var(--border-mid)}
.log-input::placeholder{color:var(--text3)}
.minireview-input{font-family:var(--sans);font-size:13px;line-height:1.6;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;resize:none;width:100%;min-height:80px;outline:none;transition:border-color .15s}
.minireview-input:focus{border-color:var(--border-mid)}
.minireview-input::placeholder{color:var(--text3)}
.energy-wrap{display:flex;align-items:center;gap:10px}
.energy-lbl{font-size:12px;color:var(--text2)}
.stars{display:flex;gap:4px}
.star{font-size:22px;cursor:pointer;color:var(--border-mid);transition:transform .1s}
.star.lit{color:#E8A020}
.star:active{transform:scale(1.3)}
.add-entry-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:1.5px dashed var(--border-mid);border-radius:9px;background:none;cursor:pointer;color:var(--text2);font-size:12px;font-family:var(--sans);transition:all .15s;width:100%}
.add-entry-btn:hover{background:var(--bg);border-color:var(--text3)}

/* ═══ OVERVIEW ═══ */
#v-ov .inner{padding:16px;display:flex;flex-direction:column;gap:16px;padding-bottom:24px}
.week-nav{display:flex;align-items:center;gap:8px}
.week-nav button{font-family:var(--mono);font-size:13px;background:var(--surface);border:1px solid var(--border-mid);border-radius:7px;padding:5px 12px;cursor:pointer;color:var(--text2)}
.week-lbl{flex:1;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text)}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s}
.ov-card:nth-child(5){grid-column:span 2}
.ov-stripe{height:3px;border-radius:2px;margin-bottom:10px}
.ov-name{font-size:13px;font-weight:500;margin-bottom:6px}
.ov-pct{font-family:var(--mono);font-size:28px;font-weight:500;line-height:1}
.ov-bar-t{height:4px;background:var(--border);border-radius:2px;margin-top:10px}
.ov-bar-f{height:4px;border-radius:2px;transition:width .5s ease}
.ov-sub{font-size:10px;color:var(--text3);margin-top:4px}
.hm-lbls{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.hm-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);text-align:center}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hm-cell{aspect-ratio:1;border-radius:4px;background:var(--border)}
.hm-cell span{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.7)}
.bp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);margin-bottom:8px}
.bp-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bp-dot{width:8px;height:8px;border-radius:50%}
.bp-name{font-size:13px;font-weight:500}
.bp-input{font-family:var(--sans);font-size:12px;width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 10px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.bp-input:focus{border-color:var(--border-mid)}
.bp-input::placeholder{color:var(--text3)}
.bp-save{margin-top:7px;font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border-mid);background:var(--surface);color:var(--text2);cursor:pointer;font-family:var(--sans)}

/* ═══ DETAIL ═══ */
#v-detail{background:var(--bg)}
.detail-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{background:none;border:none;cursor:pointer;font-size:22px;color:var(--text2);padding:0 4px;line-height:1}
.detail-stripe{width:4px;height:22px;border-radius:2px}
.detail-title{font-size:16px;font-weight:500}
.dtabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.dtab{flex:1;padding:10px;font-size:12px;font-weight:500;text-align:center;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s}
.dtab.active{color:var(--text);border-bottom-color:var(--text)}
.dbody{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.lhist-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.lhist-date{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:4px}
.lhist-entry{border-bottom:1px solid var(--border);padding:8px 0}
.lhist-entry:last-child{border-bottom:none;padding-bottom:0}
.lhist-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:4px}
.lhist-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px}
.lhist-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.lhist-text{font-size:12px;line-height:1.6;color:var(--text)}
.lhist-review{font-size:12px;line-height:1.6;color:var(--text2);margin-top:4px;font-style:italic}

/* Action tool */
.at-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.at-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.at-dot{width:8px;height:8px;border-radius:50%}
.at-lbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.at-sub{font-size:10px;color:var(--text3);margin-left:auto}
.at-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.at-textarea{font-family:var(--sans);font-size:12px;line-height:1.6;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 11px;resize:none;width:100%;min-height:70px;outline:none;transition:border-color .15s;color:var(--text)}
.at-textarea:focus{border-color:var(--border-mid)}
.at-textarea::placeholder{color:var(--text3)}
.at-q-block{background:var(--bg);border-radius:7px;padding:9px 11px}
.at-q-lbl{font-size:10px;font-weight:500;letter-spacing:.04em;color:var(--text2);margin-bottom:3px;text-transform:uppercase}
.at-q-txt{font-size:12px;color:var(--text);margin-bottom:6px}
.at-q-input{font-family:var(--sans);font-size:12px;width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 10px;background:var(--surface);color:var(--text);outline:none}
.at-q-input:focus{border-color:var(--border-mid)}
.logic-out{font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;max-height:200px;overflow-y:auto}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px}
.tchip{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;background:#EDE8F7;color:#4A2D7A}
.action-next{font-family:var(--sans);font-size:12px;background:var(--c1b);border:1px solid var(--border);border-radius:7px;padding:9px 11px;resize:none;width:100%;height:65px;outline:none;color:var(--text)}
.ar-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.ar-date{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:5px}
.ar-task{font-size:13px;font-weight:500;color:var(--c1);margin-bottom:4px}
.ar-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.ar-logic{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.ar-result{background:var(--bg);border-radius:6px;padding:7px 10px}
.ar-r-lbl{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.ar-r-txt{font-size:11px;color:var(--text2)}
.ar-r-edit{font-size:10px;color:var(--c1);cursor:pointer;text-decoration:underline;margin-top:3px;display:inline-block}
.ar-r-input{font-family:var(--sans);font-size:11px;width:100%;border:1px solid var(--border-mid);border-radius:5px;padding:5px 8px;background:var(--surface);color:var(--text);outline:none;margin-top:5px}

/* ═══ REVIEW ═══ */
#v-rev .inner{padding:16px;display:flex;flex-direction:column;gap:14px;padding-bottom:24px}
.rev-trigger{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 20px;text-align:center;box-shadow:var(--shadow)}
.rev-emoji{font-size:36px;margin-bottom:10px}
.rev-title{font-size:17px;font-weight:500;margin-bottom:6px}
.rev-sub{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:18px}
.rev-full{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;white-space:pre-wrap;font-size:13px;line-height:1.85;color:var(--text)}
.rev-hist{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .15s;margin-bottom:8px}
.rev-hist:hover{border-color:var(--border-mid)}
.rev-hist-wk{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:5px}
.rev-hist-pre{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;padding:20px 20px calc(20px + var(--safe-b))}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-close{float:right;background:none;border:none;font-size:24px;cursor:pointer;color:var(--text3);line-height:1}
.modal-title{font-size:16px;font-weight:500;margin-bottom:16px}

/* CONFETTI */

// ═══════════════════ DATA ═══════════════════
const DOMAINS = [

   actions:['找Nike/Adidas英文年报','每天15分钟精读记词汇','完成第一篇报告写总结'],
   logQ:[
     {id:'type',q:'今天用英语做了什么？',type:'tags',opts:['精读文章','听播客/视频','记词汇','口语练习','没有']},
     {id:'word',q:'记下一个新词或句子（可选）',type:'text',ph:'例：go-to-market strategy — 市场推广策略…'},
   ]},

const QUOTES = [
  '宏观视野是你的优势，今天给它一个微观的落脚点。',
  '每一次记录，都是在给未来的自己写情报。',

  '不要比别人的进度，只和昨天的自己比较。',
  '记录是思考的外化，外化才能沉淀。',
];

const ENTJ_LINES = {
  streak0: '今天还没打卡。拖延不会让事情变容易。',
  streak1: '开始了。坚持下去，习惯需要时间建立。',
  streak3: '三天了。这是一个好的信号，但还不稳定。',
  streak7: '七天连击。你已经在建立别人没有的系统了。',
  streak14: '两周。大多数人在这里放弃了。你没有。',
  streak30: '一个月。这不再是「尝试」，这是你的习惯。',
  save: '记录完成。数据积累才能让复盘有意义。',
  review: '复盘不是总结，是为下周的决策提供依据。',
};

let DB = JSON.parse(localStorage.getItem('gdb_v4') || JSON.stringify({
  logs:{}, milestones:{}, thesisMilestones:[],
  actions:{}, blockpoints:{}, actionRecords:[],
  reviews:{}, customMilestones:{}, customActions:{}
}));
function save(){localStorage.setItem('gdb_v4',JSON.stringify(DB))}

let ovWk = wkKey(new Date());
let curDom = null, prevView = 'home', curTab = 0;
let entjVisible = false;

function today(){return new Date().toISOString().slice(0,10)}
function nowTime(){const n=new Date();return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`}
function wkKey(d){const dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()-dt.getDay()+1);return dt.toISOString().slice(0,10)}
function wkLabel(k){const s=new Date(k),e=new Date(k);e.setDate(e.getDate()+6);return `${s.getMonth()+1}/${s.getDate()} – ${e.getMonth()+1}/${e.getDate()}`}

function getDayLogs(did, dk){
  if(!DB.logs[dk]) DB.logs[dk]={};
  if(!DB.logs[dk][did]) DB.logs[dk][did]=[];
  return DB.logs[dk][did];
}
function getStreak(){
  let s=0,d=new Date();d.setHours(0,0,0,0);
  while(true){
    const k=d.toISOString().slice(0,10);
    const dl=DB.logs[k]||{};
    if(!Object.values(dl).some(arr=>Array.isArray(arr)&&arr.length>0)) break;
    s++;d.setDate(d.getDate()-1);
  }
  return s;
}
function getMilestones(did){return DB.customMilestones?.[did]||DOMAINS.find(d=>d.id===did).milestones}
function getActions(did){return DB.customActions?.[did]||DOMAINS.find(d=>d.id===did).actions}
function weekPct(did,wk){
  const dom=DOMAINS.find(d=>d.id===did);
  const ms=DB.milestones[did]||[];
  const milestones=getMilestones(did);
  const mDone=milestones.filter((_,i)=>ms[i]).length;
  const wAct=DB.actions[wk]?.[did]||[];
  const actions=getActions(did);
  const aDone=actions.filter((_,i)=>wAct[i]).length;
  const start=new Date(wk);let logged=0;
  for(let i=0;i<7;i++){
    const dt=new Date(start);dt.setDate(dt.getDate()+i);
    const k=dt.toISOString().slice(0,10);
    if((DB.logs[k]?.[did]||[]).length>0) logged++;
  }
  return Math.round(((mDone+aDone+logged)/(milestones.length+actions.length+7))*100);
}

// ═══════════════════ ROUTING ═══════════════════
function sw(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('v-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='home') renderHome();
  if(name==='ov') renderOv();
  if(name==='rev') renderRev();
}
function openDetail(did){
  prevView=document.querySelector('.view.active').id.replace('v-','');
  curDom=DOMAINS.find(d=>d.id===did);curTab=0;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-detail').classList.add('active');
  renderDetail();
}
function goBack(){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+prevView).classList.add('active');
  const idx={home:0,ov:1,rev:2}[prevView]||0;
  document.querySelectorAll('.nbtn')[idx]?.classList.add('active');
  if(prevView==='ov') renderOv();
  else if(prevView==='home') renderHome();
}

// ═══════════════════ ENTJ MASCOT ═══════════════════
function getEntjLine(){
  const streak=getStreak();
  if(streak>=30) return ENTJ_LINES.streak30;
  if(streak>=14) return ENTJ_LINES.streak14;
  if(streak>=7) return ENTJ_LINES.streak7;
  if(streak>=3) return ENTJ_LINES.streak3;
  if(streak>=1) return ENTJ_LINES.streak1;
  return ENTJ_LINES.streak0;
}
function setEntjText(text){
  document.getElementById('entj-text').textContent=text;
}
function toggleEntj(){
  entjVisible=!entjVisible;
  const bubble=document.getElementById('entj-bubble');
  bubble.style.display=entjVisible?'block':'none';
  if(entjVisible) setEntjText(getEntjLine());
}
function showEntjComment(text){
  setEntjText(text);
  document.getElementById('entj-bubble').style.display='block';
  entjVisible=true;
  setTimeout(()=>{
    document.getElementById('entj-bubble').style.display='none';
    entjVisible=false;
  },5000);
}

// ═══════════════════ HOME ═══════════════════
function renderHome(){
  const now=new Date();
  const days=['日','一','二','三','四','五','六'];
  document.getElementById('hero-date').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 周${days[now.getDay()]}`;
  const streak=getStreak();
  document.getElementById('streak-num').textContent=streak>0?`${streak}天连击`:'开始打卡';
  const doy=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
  document.getElementById('daily-quote').textContent=QUOTES[doy%QUOTES.length];

  // Focus chips
  const fr=document.getElementById('focus-row');
  fr.innerHTML='';
  DOMAINS.forEach(dom=>{
    const pct=weekPct(dom.id,wkKey(new Date()));
    const chip=document.createElement('div');
    chip.className='focus-chip';chip.onclick=()=>openDetail(dom.id);
    chip.innerHTML=`<div class="focus-dot" style="background:${dom.color}"></div>
      <span class="focus-chip-name">${dom.name}</span>
      <span class="focus-chip-pct">${pct}%</span>`;
    fr.appendChild(chip);
  });

  // Domain cards
  const list=document.getElementById('domain-list');
  list.innerHTML='';
  const tk=today();
  DOMAINS.forEach(dom=>{
    const entries=getDayLogs(dom.id,tk);
    const pct=weekPct(dom.id,wkKey(new Date()));
    const r=13,circ=2*Math.PI*r;
    const dash=`${(pct/100)*circ} ${circ}`;
    const milestones=getMilestones(dom.id);
    const actions=getActions(dom.id);
    const ms=DB.milestones[dom.id]||[];
    const wAct=DB.actions[wkKey(new Date())]?.[dom.id]||[];

    const card=document.createElement('div');
    card.className='dcard';
    card.innerHTML=`
      <div class="dcard-head" onclick="toggleDcard('${dom.id}')">
        <div class="dcard-stripe" style="background:${dom.color};height:${entries.length>0?36:28}px"></div>
        <div class="dcard-info">
          <div class="dcard-name">${dom.name}</div>
          <div class="dcard-status" id="dcs-${dom.id}">
            ${entries.length>0?`<span style="color:${dom.color}">✓ 已记录 ${entries.length} 条</span>`:'<span>未打卡</span>'}
          </div>
        </div>
        <svg class="dcard-ring" viewBox="0 0 32 32">
          <circle class="dcard-ring-track" cx="16" cy="16" r="${r}"/>
          <circle class="dcard-ring-fill" cx="16" cy="16" r="${r}" stroke="${dom.color}" stroke-dasharray="${dash}" stroke-dashoffset="0"/>
          <text class="dcard-ring-pct" x="16" y="19" text-anchor="middle">${pct}%</text>
        </svg>
      </div>
      <div class="dcard-body" id="dcb-${dom.id}">
        <div class="dcard-inner">
          <div class="slbl">里程碑</div>
          <div class="item-list">
            ${milestones.map((m,i)=>itemRowHTML(dom.id,'m',i,m,ms[i],dom.color)).join('')}
          </div>
          <div class="slbl">本周行动</div>
          <div class="item-list">
            ${actions.map((a,i)=>itemRowHTML(dom.id,'a',i,a,wAct[i],dom.color)).join('')}
          </div>
          <div class="divider"></div>
          <div class="slbl">今日记录</div>
          <div id="log-area-${dom.id}">
            ${renderLogArea(dom, entries)}
          </div>
        </div>
      </div>`;
    list.appendChild(card);
  });

  checkRevBadge();
  checkMidweek();
}

function renderLogArea(dom, entries){
  let html='';
  // Saved entries
  if(entries.length>0){
    html+=`<div class="log-records" id="lrecs-${dom.id}">`;
    entries.forEach((e,i)=>{
      const tagStr=Object.values(e.tags||{}).filter(Boolean);
      const textStr=Object.values(e.text||{}).filter(Boolean);
      html+=`<div class="log-record-card">
        <div class="lrc-time">${e.time||''}</div>
        ${tagStr.length?`<div class="lrc-tags">${tagStr.map(t=>`<span class="lrc-tag">${t}</span>`).join('')}</div>`:''}
        ${textStr.map(t=>`<div class="lrc-text">${t}</div>`).join('')}
        ${e.minireview?`<div class="lrc-text" style="color:var(--text2);border-top:1px solid var(--border);margin-top:6px;padding-top:6px;font-style:italic">${e.minireview}</div>`:''}
        <div class="lrc-stars">${'★'.repeat(e.energy||0)}${'☆'.repeat(5-(e.energy||0))}</div>
        <button class="lrc-del" onclick="delEntry('${dom.id}','${today()}',${i})">×</button>
      </div>`;
    });
    html+='</div>';
    // AI comment on latest entry
    if(entries[entries.length-1]?.aiComment){
      html+=`<div class="ai-comment-card">

}

function toggleDcard(did){

// Tag selection
const tagState={};
function selTag(did,qid,opt,color,el){
  if(!tagState[did]) tagState[did]={};
  tagState[did][qid]=tagState[did][qid]===opt?null:opt;
  const parent=el.closest('.tag-grid');
  parent.querySelectorAll('.tag-opt').forEach(t=>{
    const match=t.textContent===tagState[did][qid];
    t.classList.toggle('sel',match);
    t.style.background=match?color:'';
    t.style.color=match?'#fff':'';
  });
}

// Energy
const energyState={};
function setEnergy(did,val){
  energyState[did]=energyState[did]===val?0:val;
  document.querySelectorAll(`#st-${did} .star`).forEach((s,i)=>{
    s.classList.toggle('lit',i<energyState[did]);
    s.textContent=i<energyState[did]?'★':'☆';
  });
}

// Item rows
function itemRowHTML(did,type,idx,text,done,color){
  return `<div class="item-row">
    <div class="item-check ${done?'done':''}" style="${done?'background:'+color:''}"
      onclick="toggleItem('${did}','${type}',${idx})"></div>
    <div class="item-text-wrap">
      <span class="item-text ${done?'done':''}" id="it-${did}-${type}-${idx}">${text}</span>
      <button class="item-edit-btn" onclick="editItem('${did}','${type}',${idx})">✎</button>
    </div>
  </div>`;
}
function toggleItem(did,type,idx){
  const wk=wkKey(new Date());
  if(type==='m'){
    if(!DB.milestones[did]) DB.milestones[did]=[];
    DB.milestones[did][idx]=!DB.milestones[did][idx];
  } else {
    if(!DB.actions[wk]) DB.actions[wk]={};
    if(!DB.actions[wk][did]) DB.actions[wk][did]=[];
    DB.actions[wk][did][idx]=!DB.actions[wk][did][idx];
  }
  save(); renderHome();
}
function editItem(did,type,idx){
  const id=`it-${did}-${type}-${idx}`;
  const el=document.getElementById(id);
  if(!el) return;
  const cur=el.textContent;
  const input=document.createElement('input');
  input.className='item-edit-input'; input.value=cur;
  el.replaceWith(input); input.focus();
  const done=()=>{
    const nv=input.value.trim()||cur;
    if(!DB.customMilestones) DB.customMilestones={};
    if(!DB.customActions) DB.customActions={};
    const dom=DOMAINS.find(d=>d.id===did);
    if(type==='m'){
      if(!DB.customMilestones[did]) DB.customMilestones[did]=[...dom.milestones];
      DB.customMilestones[did][idx]=nv;
    } else {
      if(!DB.customActions[did]) DB.customActions[did]=[...dom.actions];
      DB.customActions[did][idx]=nv;
    }
    save();
    const span=document.createElement('span');
    span.className='item-text';span.id=id;span.textContent=nv;
    input.replaceWith(span);
  };
  input.onblur=done;
  input.onkeydown=e=>{if(e.key==='Enter')input.blur()};
}

// Save entry
async function saveEntry(did){
  const dom=DOMAINS.find(d=>d.id===did);
  const tk=today();
  const entries=getDayLogs(did,tk);

  // Collect data
  const tags=tagState[did]||{};
  const text={};
  dom.logQ.forEach(q=>{
    if(q.type==='text'){
      const el=document.getElementById(`lt-${did}-${q.id}`);
      if(el) text[q.id]=el.value.trim();
    }
  });
  const minireview=(document.getElementById('mr-'+did)?.value||'').trim();
  const energy=energyState[did]||0;

  const entry={time:nowTime(),tags:{...tags},text:{...text},minireview,energy,aiComment:''};
  entries.push(entry);
  save();

  // Reset state
  delete tagState[did]; delete energyState[did];

  // Update status label
  document.getElementById('dcs-'+did).innerHTML=
    `<span style="color:${dom.color}">✓ 已记录 ${entries.length} 条</span>`;

  // Confetti
  fireConfetti();

  // Re-render log area
  document.getElementById('log-area-'+did).innerHTML=renderLogArea(dom, entries);

  // Show add-more button now form is re-rendered
  // The form is already shown by renderLogArea, just need to reset it
  // Get AI comment
  try{
    const summary=Object.values(tags).filter(Boolean).join('、')+' '+Object.values(text).filter(Boolean).join(' ')+' '+minireview;
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:60,
        system:'你是一个理性的导师型成长伙伴（ENTJ风格）。根据用户今天某个领域的记录，给一句15字以内的点评或提示，直接、克制、有洞察力，不要废话。直接输出文字。',
        messages:[{role:'user',content:`领域：${dom.name}，记录：${summary}`}]})
    });
    const data=await res.json();
    const comment=data.content.map(i=>i.text||'').join('').trim();
    entries[entries.length-1].aiComment=comment;
    save();
    showEntjComment(comment);
    // Update display
    document.getElementById('log-area-'+did).innerHTML=renderLogArea(dom, entries);
  }catch(e){}
}

function delEntry(did,dk,idx){
  if(!confirm('删除这条记录？')) return;
  DB.logs[dk][did].splice(idx,1);
  save();
  renderHome();
}

// Confetti
function fireConfetti(){
  const wrap=document.getElementById('conf-wrap');
  wrap.innerHTML='';
  const colors=['#1B3B4B','#3E2112','#103D20','#3B1035','#101F3E','#E8A020','#5B2D8E'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div');
    p.className='conf-piece';
    p.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[i%colors.length]};animation-duration:${.7+Math.random()*.9}s;animation-delay:${Math.random()*.25}s;transform:rotate(${Math.random()*360}deg)`;

  setTimeout(()=>wrap.innerHTML='',1400);

function checkRevBadge(){
  const now=new Date();
  if(now.getDay()!==0) return;
  const wk=wkKey(now);
  if(DB.reviews?.[wk]) return;
  const btn=document.getElementById('rev-btn');
  if(btn&&!btn.querySelector('.nbadge')){

  }
}
function checkMidweek(){
  const now=new Date();
  if(now.getDay()!==3) return;
  let logged=0;
  for(let i=0;i<3;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    if(Object.values(DB.logs[k]||{}).some(arr=>Array.isArray(arr)&&arr.length>0)) logged++;
  }
  if(logged<2){
    document.getElementById('daily-quote').textContent=`周三了，这周已打卡${logged}天。补上吧，周日复盘才有料。`;
  }
}

      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:900,
        system:'返回严格JSON无多余文字：{"logic":"底层逻辑300字内3-4段","tags":["词1","词2","词3"],"next_action":"下次可以…50字内"}',
        messages:[{role:'user',content:`工作：${atTask}\n背景：\n${qa}`}]})
    });
    const data=await res.json();
    const p=JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
    atLogic=p.logic||'';atTags=p.tags||[];atAction=p.next_action||'';
    document.getElementById('at-logic').textContent=atLogic;
    document.getElementById('at-tags').innerHTML=atTags.map(t=>`<span class="tchip">${t}</span>`).join('');
    document.getElementById('at-ap').style.display='block';
    document.getElementById('at-action-input').value=atAction;
  }catch(e){document.getElementById('at-logic').textContent='分析失败，请重试。'}
  btn.textContent='重新分析';btn.disabled=false;
}
function atSave(){
  const inputs=document.querySelectorAll('#at-mid-body .at-q-input');
  const qa={};inputs.forEach(i=>{qa[i.dataset.key]=i.value.trim()});
  if(!DB.actionRecords) DB.actionRecords=[];
  DB.actionRecords.unshift({id:Date.now(),date:today(),task:atTask,qa,logic:atLogic,tags:atTags,action:document.getElementById('at-action-input').value.trim(),result:''});
  save();fireConfetti();renderDBody();
}
function atEditR(i){document.getElementById('atri-'+i).style.display='block';document.getElementById('atrinp-'+i).focus()}
function atSaveR(i){DB.actionRecords[i].result=document.getElementById('atrinp-'+i).value.trim();save();renderDBody()}

// ═══════════════════ REVIEW ═══════════════════
function checkRevBadge(){
  if(new Date().getDay()!==0) return;
  const wk=wkKey(new Date());if(DB.reviews?.[wk]) return;
  const btn=document.getElementById('rev-btn');
  if(btn&&!btn.querySelector('.nbadge')){const b=document.createElement('span');b.className='nbadge';btn.appendChild(b)}
}
async function startReview(){
  const wk=wkKey(new Date());
  const btn=document.getElementById('rev-start-btn');btn.textContent='生成中…';btn.disabled=true;
  let summary='';
  DOMAINS.forEach(dom=>{
    summary+=`\n【${dom.name}】`;
    const start=new Date(wk);
    for(let i=0;i<7;i++){
      const d=new Date(start);d.setDate(d.getDate()+i);
      const k=d.toISOString().slice(0,10);
      const entries=DB.logs[k]?.[dom.id]||[];
      if(entries.length>0){
        summary+=`\n  ${k}(${entries.length}条):`;
        entries.forEach(e=>{
          const tags=Object.values(e.tags||{}).filter(Boolean).join('、');
          const texts=Object.values(e.text||{}).filter(Boolean).join(' ');
          summary+=` [${tags} ${texts} ${e.minireview||''}能量${e.energy}/5]`;
        });
      }
    }
    const ms=DB.milestones[dom.id]||[];
    const milestones=getMilestones(dom.id);
    const done=milestones.filter((_,i)=>ms[i]);
    if(done.length) summary+=`\n  里程碑: ${done.join('、')}`;
    const wAct=DB.actions[wk]?.[dom.id]||[];
    const actions=getActions(dom.id);
    summary+=`\n  行动: ${actions.filter((_,i)=>wAct[i]).length}/${actions.length}`;
    const bp=DB.blockpoints?.[dom.id];if(bp) summary+=`\n  卡点: ${bp}`;
  });
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,
        system:`你是一个ENTJ型导师，在帮助一位研二设计专业学生（目标：运动品牌产品规划方向）做周复盘。风格：理性、直接、克制、有洞察，说话像导师而非朋友，不废话，不煽情。根据一周记录生成复盘，600字内，自然段落，不用标题符号：
第一段：整体状态判断，直接说（2-3句）
第二段：亮点，具体说明
第三段：卡点分析，结合他设置的卡点，诚实指出
第四段：下周三条建议，编号，具体可执行
最后一句：一句话总结，克制有力`,
        messages:[{role:'user',content:`本周（${wkLabel(wk)}）记录：${summary}`}]})
    });
    const data=await res.json();
    const review=data.content.map(i=>i.text||'').join('');
    if(!DB.reviews) DB.reviews={};
    DB.reviews[wk]=review;save();
    document.querySelector('#rev-btn .nbadge')?.remove();
    showEntjComment(ENTJ_LINES.review);
    renderRev();
  }catch(e){btn.textContent='生成失败，请重试';btn.disabled=false}
}
function renderRev(){
  const inner=document.getElementById('rev-inner');
  const wk=wkKey(new Date());const existing=DB.reviews?.[wk];
  const past=Object.entries(DB.reviews||{}).filter(([k])=>k!==wk).sort((a,b)=>b[0].localeCompare(a[0]));
  const isSun=new Date().getDay()===0;
  let html='';
  if(!existing){
    html+=`<div class="rev-trigger">
      <div class="rev-emoji">${isSun?'📋':'⏳'}</div>
      <div class="rev-title">${isSun?'周复盘时间到了':'复盘在周日触发'}</div>
      <div class="rev-sub">${isSun?'一键生成，AI用导师视角帮你看清这一周':'周日自动提醒，也可以随时手动触发'}</div>
      <button class="btn btn-dark" id="rev-start-btn" onclick="startReview()" style="max-width:200px;margin:0 auto">
        ${isSun?'生成本周复盘 →':'现在生成（预览）'}
      </button>
    </div>`;
  } else {
    html+=`<div class="slbl">本周复盘 · ${wkLabel(wk)}</div>
    <div class="rev-full">${existing}</div>
    <div style="text-align:right;margin-top:8px"><button class="btn-ghost" onclick="regenRev()">重新生成</button></div>`;
  }
  if(past.length>0){
    html+=`<div class="slbl" style="margin-top:4px">历史复盘</div>
    ${past.map(([k,r])=>`<div class="rev-hist" onclick="showPastRev('${k}')">
      <div class="rev-hist-wk">W · ${wkLabel(k)}</div>
      <div class="rev-hist-pre">${r.slice(0,80)}…</div>
    </div>`).join('')}`;
  }
  inner.innerHTML=html;
}
function regenRev(){const wk=wkKey(new Date());delete DB.reviews[wk];save();renderRev();setTimeout(()=>startReview(),100)}
function showPastRev(wk){
  document.getElementById('modal-title').textContent='复盘 · '+wkLabel(wk);
  document.getElementById('modal-body').innerHTML=`<div class="rev-full">${DB.reviews[wk]}</div>`;
  document.getElementById('modal-ov').classList.add('open');
}

// ═══════════════════ UTILS ═══════════════════
function closeModal(){document.getElementById('modal-ov').classList.remove('open')}
function doExport(){
  if(typeof XLSX==='undefined'){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=doExport;document.head.appendChild(s);return}
  const rows=[];
  Object.entries(DB.logs).sort().forEach(([date,dl])=>{
    DOMAINS.forEach(dom=>{
      (dl[dom.id]||[]).forEach(e=>{
        rows.push({'日期':date,'时间':e.time||'','领域':dom.name,'标签':Object.values(e.tags||{}).filter(Boolean).join('/'),'记录内容':Object.values(e.text||{}).filter(Boolean).join(' | '),'小复盘':e.minireview||'','能量感':e.energy||0,'导师点评':e.aiComment||''});
      });
    });
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:6},{wch:10},{wch:18},{wch:50},{wch:40},{wch:6},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'每日记录');
  if(DB.actionRecords?.length){
    const ar=DB.actionRecords.map(r=>({'日期':r.date,'工作':r.task,'关键词':(r.tags||[]).join('/'),'逻辑':r.logic||'','下一步':r.action||'','结果':r.result||''}));
    const ws2=XLSX.utils.json_to_sheet(ar);
    ws2['!cols']=[{wch:12},{wch:30},{wch:18},{wch:50},{wch:30},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws2,'实习行动分析');
  }
  XLSX.writeFile(wb,`五域成长_${today()}.xlsx`);
}

  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
