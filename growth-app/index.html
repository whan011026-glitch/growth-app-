<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f0eb">
<title>五域成长</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f0eb;--surface:#fff;--border:#e0dbd2;--border-mid:#c8c2b8;
  --text:#17160f;--text2:#6b6860;--text3:#a8a49e;
  --sans:'Noto Sans SC',sans-serif;--mono:'DM Mono',monospace;
  --radius:12px;--shadow:0 1px 4px rgba(0,0,0,.07);
  --c1:#1a3a4a;--c1b:#e8f2f6;
  --c2:#3d2010;--c2b:#f7efe8;
  --c3:#0f3d1f;--c3b:#e8f5ec;
  --c4:#3a0f35;--c4b:#f5e8f4;
  --c5:#0f1f3d;--c5b:#e8edf5;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--sans);color:var(--text);display:flex;flex-direction:column}

/* ── Views ── */
.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column}
.view.active{display:flex}

/* ── Bottom Nav ── */
#bottom-nav{
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding:8px 0 calc(8px + var(--safe-bottom));
  flex-shrink:0;z-index:100;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:4px 0;color:var(--text3);
  font-family:var(--sans);transition:color .15s;
}
.nav-btn.active{color:var(--text)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn span{font-size:10px;font-weight:500;letter-spacing:.03em}

/* ── Shared components ── */
.page-header{
  padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0
}
.page-title{font-size:20px;font-weight:500}
.page-sub{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:2px}
.section-label{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.btn-primary{
  font-family:var(--sans);font-size:13px;font-weight:500;
  padding:10px 20px;border-radius:8px;border:none;
  background:var(--text);color:var(--surface);cursor:pointer;
  transition:opacity .15s;width:100%;
}
.btn-primary:active{opacity:.8}
.btn-ghost{
  font-family:var(--sans);font-size:12px;
  padding:7px 14px;border-radius:7px;border:1px solid var(--border-mid);
  background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;
}
.btn-ghost:hover{background:var(--bg)}
.divider{height:1px;background:var(--border);margin:12px 0}

/* ═══════════════════════════
   VIEW 1 · TODAY
═══════════════════════════ */
#view-today{padding-bottom:20px}
.today-header{padding:20px 20px 16px;flex-shrink:0}
.today-date{font-family:var(--mono);font-size:11px;color:var(--text3)}
.today-greeting{font-size:22px;font-weight:500;margin-top:4px;line-height:1.3}
.streak-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--text);color:var(--surface);
  font-family:var(--mono);font-size:11px;
  padding:4px 10px;border-radius:20px;margin-top:8px;
}

.today-body{padding:0 16px;flex:1}

/* Domain quick-log cards */
.domain-log-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.domain-log-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
}
.dlc-head{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  cursor:pointer;user-select:none;
}
.dlc-stripe{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.dlc-info{flex:1}
.dlc-name{font-size:13px;font-weight:500}
.dlc-status{font-size:11px;color:var(--text3);margin-top:2px}
.dlc-chevron{color:var(--text3);font-size:14px;transition:transform .2s}
.dlc-chevron.open{transform:rotate(180deg)}
.dlc-body{
  max-height:0;overflow:hidden;transition:max-height .3s ease;
  border-top:0px solid var(--border);
}
.dlc-body.open{max-height:400px;border-top-width:1px}
.dlc-inner{padding:12px 14px;display:flex;flex-direction:column;gap:10px}

.log-textarea{
  font-family:var(--sans);font-size:13px;line-height:1.6;
  color:var(--text);background:var(--bg);
  border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;resize:none;width:100%;height:80px;outline:none;
  transition:border-color .15s;
}
.log-textarea:focus{border-color:var(--border-mid)}
.log-textarea::placeholder{color:var(--text3)}

.energy-row{display:flex;align-items:center;gap:8px}
.energy-label{font-size:11px;color:var(--text2);white-space:nowrap}
.stars{display:flex;gap:3px}
.star{font-size:20px;cursor:pointer;color:var(--border-mid);transition:transform .1s}
.star.lit{color:#e8a020}
.star:active{transform:scale(1.3)}

.save-log-btn{
  font-family:var(--sans);font-size:12px;font-weight:500;
  padding:7px 0;border-radius:7px;border:none;
  cursor:pointer;transition:all .15s;width:100%;
}

/* Notification setting */
.notif-banner{
  margin:0 16px 16px;padding:12px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.notif-text{font-size:12px;color:var(--text2);line-height:1.5}
.notif-btn{
  font-size:11px;font-weight:500;padding:5px 12px;
  border-radius:6px;border:1px solid var(--border-mid);
  background:var(--text);color:var(--surface);cursor:pointer;white-space:nowrap;
}

/* ═══════════════════════════
   VIEW 2 · OVERVIEW
═══════════════════════════ */
#view-overview .inner{padding:16px}
.week-selector{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.week-selector button{
  font-family:var(--mono);font-size:12px;background:var(--surface);
  border:1px solid var(--border-mid);border-radius:6px;
  padding:5px 10px;cursor:pointer;color:var(--text2);
}
.week-selector .week-lbl{
  flex:1;text-align:center;font-family:var(--mono);font-size:12px;color:var(--text);
}

.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.ov-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);
  cursor:pointer;transition:border-color .15s;
}
.ov-card:hover{border-color:var(--border-mid)}
.ov-card:active{opacity:.9}
.ov-stripe{height:3px;border-radius:2px;margin-bottom:10px}
.ov-name{font-size:13px;font-weight:500;margin-bottom:6px}
.ov-pct{font-family:var(--mono);font-size:26px;font-weight:500;line-height:1}
.ov-sub{font-size:10px;color:var(--text3);margin-top:3px}
.ov-bar-track{height:4px;background:var(--border);border-radius:2px;margin-top:10px}
.ov-bar-fill{height:4px;border-radius:2px;transition:width .4s ease}

/* 5th card full width */
.overview-grid .ov-card:nth-child(5){grid-column:span 2}

/* Heatmap */
.heatmap-wrap{margin-bottom:20px}
.heatmap-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.hm-day{
  aspect-ratio:1;border-radius:4px;background:var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:9px;color:var(--text3);
  position:relative;cursor:default;
}
.hm-day.has-data{cursor:pointer}
.hm-day-label{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.hm-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);text-align:center}

/* ═══════════════════════════
   VIEW 3 · DETAIL (shared)
═══════════════════════════ */
#view-detail{background:var(--bg)}
.detail-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:16px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.back-btn{
  background:none;border:none;cursor:pointer;
  color:var(--text2);font-size:20px;line-height:1;padding:0 4px;
}
.detail-title{font-size:16px;font-weight:500}
.detail-stripe{width:4px;height:20px;border-radius:2px}

.detail-tabs{
  display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.detail-tab{
  flex:1;padding:10px;font-size:12px;font-weight:500;text-align:center;
  border:none;background:none;cursor:pointer;color:var(--text3);
  border-bottom:2px solid transparent;transition:all .15s;
}
.detail-tab.active{color:var(--text);border-bottom-color:var(--text)}

.detail-body{flex:1;overflow-y:auto;padding:16px}

/* Internship action tool embedded */
.action-tool-wrap{display:flex;flex-direction:column;gap:12px}
.action-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
}
.ap-header{
  padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.ap-dot{width:8px;height:8px;border-radius:50%}
.ap-label{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.ap-sub{font-size:10px;color:var(--text3);margin-left:auto}
.ap-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.ap-textarea{
  font-family:var(--sans);font-size:12px;line-height:1.6;
  background:var(--bg);border:1px solid var(--border);
  border-radius:7px;padding:9px 11px;resize:none;
  width:100%;outline:none;transition:border-color .15s;
  color:var(--text);
}
.ap-textarea:focus{border-color:var(--border-mid)}
.ap-textarea::placeholder{color:var(--text3)}
.q-block{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 11px}
.q-title{font-size:10px;font-weight:500;letter-spacing:.04em;color:var(--text2);margin-bottom:4px;text-transform:uppercase}
.q-text{font-size:12px;color:var(--text);margin-bottom:6px}
.q-input{
  font-family:var(--sans);font-size:12px;width:100%;
  border:1px solid var(--border);border-radius:6px;
  padding:6px 10px;background:var(--surface);color:var(--text);outline:none;
}
.q-input:focus{border-color:var(--border-mid)}
.logic-out{
  font-size:12px;line-height:1.7;color:var(--text);
  white-space:pre-wrap;max-height:240px;overflow-y:auto;
}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px}
.tag-chip{
  font-family:var(--mono);font-size:10px;padding:3px 9px;
  border-radius:20px;background:#ede8f7;color:#4a2d7a;
}
.action-next-input{
  font-family:var(--sans);font-size:12px;line-height:1.6;
  background:var(--c1b);border:1px solid var(--border);
  border-radius:7px;padding:9px 11px;resize:none;
  width:100%;height:70px;outline:none;color:var(--text);
}
.action-records-list{display:flex;flex-direction:column;gap:8px}
.ar-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;
}
.ar-date{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:6px}
.ar-task{font-size:13px;font-weight:500;color:var(--c1);margin-bottom:4px}
.ar-logic{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.ar-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.ar-result-wrap{background:var(--bg);border-radius:6px;padding:7px 10px}
.ar-result-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.ar-result-text{font-size:11px;color:var(--text2)}
.ar-result-input{
  font-family:var(--sans);font-size:11px;width:100%;
  border:1px solid var(--border-mid);border-radius:5px;
  padding:5px 8px;background:var(--surface);color:var(--text);outline:none;
}
.fill-result-btn{font-size:10px;color:var(--c1);cursor:pointer;text-decoration:underline;margin-top:3px;display:inline-block}

/* Loading dots */
.loading-dots span{display:inline-block;animation:blink 1.2s infinite;font-size:18px}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* Thesis detail */
.thesis-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.tp-head{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500}
.tp-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.milestone-row{display:flex;align-items:flex-start;gap:8px;cursor:pointer}
.m-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border-mid);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.m-check.done{border-color:transparent}
.m-check.done::after{content:'✓';font-size:11px;font-weight:500;color:#fff}
.m-text{font-size:12px;line-height:1.5}
.m-text.done{color:var(--text3);text-decoration:line-through}
.thesis-log-item{background:var(--bg);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.tli-date{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:4px}
.tli-content{font-size:12px;line-height:1.6;color:var(--text)}

/* Simple domain detail */
.simple-detail{display:flex;flex-direction:column;gap:12px}
.sd-milestone-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.sd-log-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.sd-head{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.03em}
.sd-body{padding:12px 14px}
.log-history-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px}
.log-history-item:last-child{border-bottom:none}
.lhi-date{font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap;padding-top:2px}
.lhi-content{font-size:12px;line-height:1.6;color:var(--text);flex:1}

/* ═══════════════════════════
   VIEW 4 · REVIEW
═══════════════════════════ */
#view-review .inner{padding:16px}
.review-trigger-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:16px;
}
.rtc-emoji{font-size:32px;margin-bottom:8px}
.rtc-title{font-size:16px;font-weight:500;margin-bottom:6px}
.rtc-sub{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:16px}
.review-output{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;line-height:1.8;font-size:13px;white-space:pre-wrap}
.review-section-head{font-size:13px;font-weight:500;margin:16px 0 8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.review-history-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;
  cursor:pointer;
}
.rhi-week{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:6px}
.rhi-preview{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.review-full{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;white-space:pre-wrap;font-size:13px;line-height:1.8;color:var(--text)}

/* ── Modal overlay ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:200;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal-sheet{
  background:var(--surface);border-radius:16px 16px 0 0;
  width:100%;max-width:600px;max-height:90vh;overflow-y:auto;
  padding:20px 20px calc(20px + var(--safe-bottom));
}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:500;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1}
</style>
</head>
<body>

<!-- ═══ VIEW: TODAY ═══ -->
<div class="view active" id="view-today">
  <div class="today-header">
    <div class="today-date" id="today-date-label"></div>
    <div class="today-greeting" id="today-greeting">今天怎么样？</div>
    <div id="streak-wrap"></div>
  </div>
  <div class="today-body">
    <div id="notif-banner-wrap"></div>
    <div class="section-label">五域今日记录</div>
    <div class="domain-log-list" id="domain-log-list"></div>
  </div>
</div>

<!-- ═══ VIEW: OVERVIEW ═══ -->
<div class="view" id="view-overview">
  <div class="page-header">
    <div>
      <div class="page-title">总览</div>
      <div class="page-sub" id="overview-week-label"></div>
    </div>
    <button class="btn-ghost" onclick="exportExcel()">导出</button>
  </div>
  <div class="inner">
    <div class="week-selector">
      <button onclick="changeOvWeek(-1)">‹</button>
      <span class="week-lbl" id="ov-week-lbl"></span>
      <button onclick="changeOvWeek(1)">›</button>
    </div>
    <div class="section-label">本周完成度</div>
    <div class="overview-grid" id="overview-grid"></div>
    <div class="section-label">打卡热力图（近28天）</div>
    <div class="heatmap-wrap">
      <div class="hm-day-label" id="hm-labels"></div>
      <div class="heatmap-days" id="heatmap"></div>
    </div>
  </div>
</div>

<!-- ═══ VIEW: DETAIL ═══ -->
<div class="view" id="view-detail">
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">‹</button>
    <div class="detail-stripe" id="detail-stripe"></div>
    <span class="detail-title" id="detail-title"></span>
  </div>
  <div class="detail-tabs" id="detail-tabs"></div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- ═══ VIEW: REVIEW ═══ -->
<div class="view" id="view-review">
  <div class="page-header" style="margin-bottom:16px">
    <div>
      <div class="page-title">周复盘</div>
      <div class="page-sub">AI 帮你看清楚这一周</div>
    </div>
  </div>
  <div class="inner" id="review-inner"></div>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<nav id="bottom-nav">
  <button class="nav-btn active" onclick="switchView('today',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <span>今日</span>
  </button>
  <button class="nav-btn" onclick="switchView('overview',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>总览</span>
  </button>
  <button class="nav-btn" onclick="switchView('review',this)">
    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    <span>复盘</span>
  </button>
</nav>

<!-- ═══ MODAL ═══ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ════════════════════════════
// CONSTANTS & DATA

function getWeekKey(d){
  const date = new Date(d);
  date.setHours(0,0,0,0);
  date.setDate(date.getDate() - date.getDay() + 1);
  return date.toISOString().slice(0,10);
}
function getWeekLabel(k){
  const s = new Date(k), e = new Date(k);
  e.setDate(e.getDate()+6);
  return `${s.getMonth()+1}/${s.getDate()} – ${e.getMonth()+1}/${e.getDate()}`;
}
function todayKey(){return new Date().toISOString().slice(0,10)}
function getLog(domId, dateKey){
  if(!DB.logs[dateKey]) DB.logs[dateKey]={};
  if(!DB.logs[dateKey][domId]) DB.logs[dateKey][domId]={text:'',energy:0,saved:false};
  return DB.logs[dateKey][domId];
}
function getStreak(){
  let streak=0, d=new Date();
  d.setHours(0,0,0,0);
  while(true){
    const k=d.toISOString().slice(0,10);
    const dayLogs=DB.logs[k]||{};
    const hasAny=Object.values(dayLogs).some(l=>l.saved);
    if(!hasAny) break;
    streak++; d.setDate(d.getDate()-1);
  }
  return streak;
}

function switchView(name, btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='today') renderToday();
  if(name==='overview') renderOverview();
  if(name==='review') renderReview();
}
function openDetail(domId){
  prevView = document.querySelector('.view.active').id.replace('view-','');
  currentDomain = DOMAINS.find(d=>d.id===domId);
  currentDetailTab = 0;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-detail').classList.add('active');
  renderDetail();
}
function goBack(){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const navBtns=document.querySelectorAll('.nav-btn');
  document.getElementById('view-'+prevView).classList.add('active');
  const idx={today:0,overview:1,review:2}[prevView]||0;
  navBtns[idx]?.classList.add('active');
  if(prevView==='overview') renderOverview();
}

function toggleLogCard(domId){
  const body=document.getElementById('dlc-body-'+domId);
  const chev=document.getElementById('dlc-chev-'+domId);
  const isOpen=body.classList.contains('open');
  document.querySelectorAll('.dlc-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.dlc-chevron').forEach(c=>c.classList.remove('open'));
  if(!isOpen){body.classList.add('open');chev.classList.add('open')}
}
function setEnergy(domId,dateKey,val){
  const log=getLog(domId,dateKey);
  log.energy=log.energy===val?0:val;
  save();
  document.querySelectorAll(`#stars-${domId} .star`).forEach((s,i)=>{
    s.classList.toggle('lit',i<log.energy);
  });
}
function saveLog(domId,dateKey){
  const log=getLog(domId,dateKey);
  log.text=document.getElementById('log-text-'+domId).value.trim();
  log.saved=true; save();
  document.getElementById('dlc-status-'+domId).textContent='✓ 已记录';
  document.getElementById('dlc-body-'+domId).classList.remove('open');
  document.getElementById('dlc-chev-'+domId).classList.remove('open');
}

function changeOvWeek(dir){

  renderOverviewGrid();
  renderHeatmap();
}
function getWeekPct(domId, weekKey){
  const dom=DOMAINS.find(d=>d.id===domId);
  // milestone progress (stored globally)
  const ms=DB.milestones[domId]||[];
  const mDone=ms.filter(Boolean).length;
  // action progress for this week
  const wAct=DB.actions[weekKey]?.[domId]||[];
  const aDone=wAct.filter(Boolean).length;
  // days logged this week
  const start=new Date(weekKey);
  let logged=0;
  for(let i=0;i<7;i++){
    const d=new Date(start); d.setDate(d.getDate()+i);
    const k=d.toISOString().slice(0,10);
    if(DB.logs[k]?.[domId]?.saved) logged++;
  }
  const total=dom.milestones.length+dom.actions.length+7;
  return Math.round(((mDone+aDone+logged)/total)*100);
}
function renderOverviewGrid(){
  const grid=document.getElementById('overview-grid');
  grid.innerHTML='';
  DOMAINS.forEach(dom=>{
    const pct=getWeekPct(dom.id,ovWeek);
    const card=document.createElement('div');
    card.className='ov-card';
    card.onclick=()=>openDetail(dom.id);
    card.innerHTML=`
      <div class="ov-stripe" style="background:${dom.color}"></div>
      <div class="ov-name">${dom.name}</div>
      <div class="ov-pct">${pct}<span style="font-size:14px;color:var(--text3)">%</span></div>
      <div class="ov-sub">本周完成度</div>
      <div class="ov-bar-track"><div class="ov-bar-fill" style="width:${pct}%;background:${dom.color}"></div></div>`;
    grid.appendChild(card);
  });
}
function renderHeatmap(){
  const lbls=document.getElementById('hm-labels');
  const map=document.getElementById('heatmap');
  const days=['一','二','三','四','五','六','日'];
  lbls.innerHTML=days.map(d=>`<div class="hm-lbl">${d}</div>`).join('');

  const end=new Date(); end.setHours(0,0,0,0);
  const start=new Date(end); start.setDate(start.getDate()-27);
  // align to Monday
  while(start.getDay()!==1) start.setDate(start.getDate()-1);

  map.innerHTML='';
  let d=new Date(start);
  while(d<=end){
    const k=d.toISOString().slice(0,10);
    const dayLogs=DB.logs[k]||{};
    const loggedCount=Object.values(dayLogs).filter(l=>l.saved).length;
    const opacity=loggedCount===0?0:0.2+(loggedCount/5)*0.8;
    const div=document.createElement('div');
    div.className='hm-day'+(loggedCount>0?' has-data':'');
    div.style.background=loggedCount>0?`rgba(26,58,74,${opacity})`:'var(--border)';
    div.title=`${k} · ${loggedCount}个领域`;
    div.textContent=d.getDate();
    map.appendChild(div);
    d.setDate(d.getDate()+1);
  }
}

function renderDetail(){
  if(!currentDomain) return;
  const dom=currentDomain;
  document.getElementById('detail-title').textContent=dom.name;
  document.getElementById('detail-stripe').style.background=dom.color;

  const tabs=dom.type==='internship'?['日志','行动分析','里程碑']:
             dom.type==='thesis'?['日志','论文进度']:['日志','里程碑'];
  const tabsEl=document.getElementById('detail-tabs');
  tabsEl.innerHTML=tabs.map((t,i)=>`
    <button class="detail-tab ${i===currentDetailTab?'active':''}"
      onclick="switchDetailTab(${i})">${t}</button>`).join('');

  renderDetailBody();
}
function switchDetailTab(i){
  currentDetailTab=i; renderDetail();
}
function renderDetailBody(){
  const dom=currentDomain;
  const body=document.getElementById('detail-body');

  if(currentDetailTab===0){
    // LOG TAB — all domains
    const allLogs=Object.entries(DB.logs)
      .sort((a,b)=>b[0].localeCompare(a[0]))
      .filter(([,dl])=>dl[dom.id]?.saved)
      .slice(0,30);
    body.innerHTML=`
      <div class="section-label" style="margin-bottom:12px">历史记录</div>
      ${allLogs.length===0?'<div style="color:var(--text3);font-size:13px;text-align:center;padding:40px 0">还没有记录，去今日页打卡吧</div>':''}
      <div class="log-history-list">
      ${allLogs.map(([date, dl])=>{
        const log=dl[dom.id];
        const stars='★'.repeat(log.energy||0)+'☆'.repeat(5-(log.energy||0));
        return `<div class="log-history-item">
          <div class="lhi-date">${date}<br>${stars}</div>
          <div class="lhi-content">${log.text||'（无文字记录）'}</div>
        </div>`;
      }).join('')}
      </div>`;
  } else if(dom.type==='internship' && currentDetailTab===1){
    renderActionTool(body);
  } else if(dom.type==='internship' && currentDetailTab===2){
    renderMilestoneTab(body, dom);
  } else if(dom.type==='thesis' && currentDetailTab===1){
    renderThesisProgress(body);
  } else {
    renderMilestoneTab(body, dom);
  }
}

function toggleMilestone(domId,idx){
  if(!DB.milestones[domId]) DB.milestones[domId]=[];
  DB.milestones[domId][idx]=!DB.milestones[domId][idx];
  save(); renderDetailBody();
}
function toggleWeekAction(domId,idx){
  const wk=getWeekKey(new Date());
  if(!DB.actions[wk]) DB.actions[wk]={};
  if(!DB.actions[wk][domId]) DB.actions[wk][domId]=[];
  DB.actions[wk][domId][idx]=!DB.actions[wk][domId][idx];
  save(); renderDetailBody();
}

      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,
        system:`生成4个拆解问题。返回严格JSON无其他文字：{"questions":[{"key":"background","label":"背景","question":"问题"},{"key":"goal","label":"目的","question":"问题"},{"key":"decision","label":"决策","question":"问题"},{"key":"role","label":"我的角色","question":"问题"}]}问题15字内口语化。`,
        messages:[{role:'user',content:`工作：${task}`}]})
    });
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    atCurrentQuestions=JSON.parse(text).questions;
  }catch(e){
    atCurrentQuestions=[
      {key:'background',label:'背景',question:'这个任务是谁交给你的？'},
      {key:'goal',label:'目的',question:'做完是为了得到什么结果？'},
      {key:'decision',label:'决策',question:'结果会用来做什么决定？'},
      {key:'role',label:'我的角色',question:'你负责哪一部分？'}
    ];
  }
  const midBody=document.getElementById('at-mid-body');
  midBody.innerHTML=atCurrentQuestions.map(q=>`
    <div class="q-block">
      <div class="q-title">${q.label}</div>
      <div class="q-text">${q.question}</div>
      <input class="q-input" data-key="${q.key}" placeholder="你的回答…">
    </div>`).join('')+
    `<button class="btn-primary" id="at-analyze-btn" onclick="atAnalyze()" style="background:#6b3a9e;margin-top:4px">分析底层逻辑 →</button>`;
  btn.textContent='重新生成';btn.disabled=false;
}

async function atAnalyze(){
  const inputs=document.querySelectorAll('#at-mid-body .q-input');
  const qaText=Array.from(inputs).map(i=>`${atCurrentQuestions.find(q=>q.key===i.dataset.key)?.label||i.dataset.key}：${i.value.trim()||'未填写'}`).join('\n');
  const btn=document.getElementById('at-analyze-btn');
  btn.textContent='分析中…';btn.disabled=true;
  document.getElementById('at-right-panel').style.display='block';
  document.getElementById('at-logic-out').innerHTML='<div class="loading-dots"><span>·</span><span>·</span><span>·</span></div>';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,
        system:`分析实习生工作底层逻辑。返回严格JSON无其他文字：{"logic":"分析300字内3-4段自然段落","tags":["词1","词2","词3"],"next_action":"下次可以…50字内"}`,
        messages:[{role:'user',content:`工作：${atTask}\n背景：\n${qaText}`}]})
    });
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(text);
    atLogic=parsed.logic||'';atTags=parsed.tags||[];atAction=parsed.next_action||'';
    document.getElementById('at-logic-out').textContent=atLogic;
    document.getElementById('at-tags-wrap').innerHTML=atTags.map(t=>`<span class="tag-chip">${t}</span>`).join('');
    document.getElementById('at-action-panel').style.display='block';
    document.getElementById('at-action-input').value=atAction;
  }catch(e){
    document.getElementById('at-logic-out').textContent='分析失败，请重试。';
  }
  btn.textContent='重新分析';btn.disabled=false;
}

function atSaveRecord(){
  const inputs=document.querySelectorAll('#at-mid-body .q-input');
  const qa={};
  inputs.forEach(i=>{qa[i.dataset.key]=i.value.trim()});
  const action=document.getElementById('at-action-input').value.trim();
  if(!DB.actionRecords) DB.actionRecords=[];
  DB.actionRecords.unshift({
    id:Date.now(),
    date:todayKey(),
    task:atTask,qa,logic:atLogic,tags:atTags,action,result:''
  });
  save();
  renderDetailBody();
}
function atEditResult(idx){
  document.getElementById(`at-result-input-wrap-${idx}`).style.display='block';
  document.getElementById(`at-result-input-${idx}`).focus();
}
function atSaveResult(idx){
  DB.actionRecords[idx].result=document.getElementById(`at-result-input-${idx}`).value.trim();
  save(); renderDetailBody();
}

// WEEKLY REVIEW
// ════════════════════════════
function checkAutoReview(){
  const now=new Date();
  if(now.getDay()!==0) return; // Sunday only
  const wk=getWeekKey(now);
  if(DB.reviews?.[wk]) return; // already done this week
  // show notification or badge
  const btn=document.querySelector('.nav-btn:nth-child(3)');
  if(btn && !btn.querySelector('.badge')){
    const badge=document.createElement('span');
    badge.className='badge';
    badge.style.cssText='position:absolute;top:4px;right:16px;width:8px;height:8px;background:#e85d3c;border-radius:50%';
    btn.style.position='relative';
    btn.appendChild(badge);
  }
}

async function startReview(){
  const wk=getWeekKey(new Date());
  const btn=document.getElementById('review-start-btn');
  btn.textContent='生成中…';btn.disabled=true;

  // Compile week data
  const start=new Date(wk);
  let summary='';
  DOMAINS.forEach(dom=>{
    summary+=`\n【${dom.name}】\n`;
    for(let i=0;i<7;i++){
      const d=new Date(start); d.setDate(d.getDate()+i);
      const k=d.toISOString().slice(0,10);
      const log=DB.logs[k]?.[dom.id];
      if(log?.saved) summary+=`  ${k}: ${log.text||'（有打卡无文字）'} 能量:${log.energy||0}/5\n`;
    }
    const ms=DB.milestones[dom.id]||[];
    const done=dom.milestones.filter((_,i)=>ms[i]);
    if(done.length) summary+=`  里程碑完成: ${done.join('、')}\n`;
    const wAct=DB.actions[wk]?.[dom.id]||[];
    const aDone=dom.actions.filter((_,i)=>wAct[i]);
    summary+=`  本周行动完成: ${aDone.length}/${dom.actions.length}\n`;
  });

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,
        system:`你是一个陪伴研二学生成长的复盘伙伴。根据他一周的记录，生成一份结构化周复盘。

格式（用中文，不要markdown标题符号，用自然段落，控制在600字内）：
第一段：这一周的整体状态（热情度/能量感/完成度的综合判断，2-3句）
第二段：亮点——哪个领域做得最好，具体是什么（1-2个）
第三段：缺口——哪里做得不够，可能的原因是什么（诚实但不批判）
第四段：下周建议——3条具体可执行的建议（编号列出）
第五段：一句鼓励的话（真诚，不要说教）`,
        messages:[{role:'user',content:`本周（${getWeekLabel(wk)}）记录：\n${summary}`}]})
    });
    const data=await res.json();
    const review=data.content.map(i=>i.text||'').join('');
    if(!DB.reviews) DB.reviews={};
    DB.reviews[wk]=review;
    save();
    renderReview();
  }catch(e){
    btn.textContent='生成失败，请重试';btn.disabled=false;
  }
}

function renderReview(){
  const inner=document.getElementById('review-inner');
  const wk=getWeekKey(new Date());
  const existingReview=DB.reviews?.[wk];
  const pastReviews=Object.entries(DB.reviews||{}).filter(([k])=>k!==wk).sort((a,b)=>b[0].localeCompare(a[0]));
  const isSunday=new Date().getDay()===0;

  inner.innerHTML=`
    ${!existingReview?`
    <div class="review-trigger-card">
      <div class="rtc-emoji">${isSunday?'📋':'⏳'}</div>
      <div class="rtc-title">${isSunday?'周复盘时间到了':'复盘在周日触发'}</div>
      <div class="rtc-sub">${isSunday
        ?'一键生成本周复盘，AI帮你梳理这周的状态、亮点、缺口和下周建议'
        :'周日晚上会提醒你，或者随时手动触发'}</div>
      <button class="btn-primary" id="review-start-btn" onclick="startReview()"
        style="max-width:200px;margin:0 auto">
        ${isSunday?'生成本周复盘 →':'现在提前复盘'}
      </button>
    </div>`:
    `<div class="review-section-head">本周复盘 · ${getWeekLabel(wk)}</div>
     <div class="review-full">${existingReview}</div>
     <div style="margin-top:12px;text-align:right">
       <button class="btn-ghost" onclick="regenerateReview()">重新生成</button>
     </div>`}

    ${pastReviews.length>0?`
    <div class="review-section-head">历史复盘</div>
    ${pastReviews.map(([k,r])=>`
      <div class="review-history-item" onclick="showPastReview('${k}')">
        <div class="rhi-week">W · ${getWeekLabel(k)}</div>
        <div class="rhi-preview">${r.slice(0,80)}…</div>
      </div>`).join('')}`:''}`;
}

function regenerateReview(){
  const wk=getWeekKey(new Date());
  delete DB.reviews[wk]; save(); renderReview();
  setTimeout(()=>startReview(),100);
}

function showPastReview(wk){
  document.getElementById('modal-title').textContent='复盘 · '+getWeekLabel(wk);
  document.getElementById('modal-body').innerHTML=`<div class="review-full">${DB.reviews[wk]}</div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

// MODAL
// ════════════════════════════
function closeModal(e){
  if(!e || e.target===document.getElementById('modal-overlay')){
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// EXPORT
// ════════════════════════════
function exportExcel(){
  if(typeof XLSX==='undefined'){
    alert('请稍候，正在加载导出功能…');
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>doExport();
    document.head.appendChild(s);
    return;
  }
  doExport();
}
function doExport(){
  const rows=[];
  Object.entries(DB.logs).sort().forEach(([date,dayLogs])=>{
    DOMAINS.forEach(dom=>{
      const log=dayLogs[dom.id];
      if(log?.saved) rows.push({
        '日期':date,'领域':dom.name,
        '记录内容':log.text||'','能量感':log.energy||0
      });
    });
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:10},{wch:60},{wch:8}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'每日记录');
  if(DB.actionRecords?.length){
    const ar=DB.actionRecords.map(r=>({'日期':r.date,'工作内容':r.task,'关键词':(r.tags||[]).join('/'),'底层逻辑':r.logic||'','下一步':r.action||'','结果':r.result||''}));
    const ws2=XLSX.utils.json_to_sheet(ar);
    ws2['!cols']=[{wch:12},{wch:30},{wch:18},{wch:50},{wch:30},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws2,'实习行动分析');
  }
  XLSX.writeFile(wb,`五域成长_${todayKey()}.xlsx`);
}
